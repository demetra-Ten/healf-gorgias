let macros = [];
let activeInbox = 'ops';
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');

async function loadMacros() {
  try { const { data } = await db.from('macros').select('name,body').order('sort_index'); macros = data || []; } catch (e) { macros = []; }
}

function renderNav() {
  document.getElementById('inbox-nav').innerHTML = INBOXES.map(ib => {
    const n = TICKETS.filter(t => t.inbox === ib.id).length;
    return `<div class="nav-item${ib.id===activeInbox?' active':''}" onclick="selectInbox('${ib.id}')">
      <div class="nav-item-left"><span class="nav-item-icon">${ICON[ib.icon]}</span><span>${ib.label}</span></div>
      <span class="nav-count">${n}</span></div>`;
  }).join('');
}
function selectInbox(id) {
  activeInbox = id;
  const ib = INBOXES.find(i => i.id === id);
  document.getElementById('head-icon').innerHTML = `<span style="color:#6b7280;display:inline-flex;width:18px;height:18px">${ICON[ib.icon]}</span>`;
  document.getElementById('head-title').textContent = ib.label;
  document.getElementById('head-sub').textContent = ib.sub;
  document.getElementById('detail').style.display = 'none';
  document.getElementById('tlist').style.display = 'block';
  renderNav();
  renderList();
}
function renderList() {
  const rows = TICKETS.filter(t => t.inbox === activeInbox);
  document.getElementById('tlist').innerHTML = rows.map(t => `
    <div class="trow" onclick="openTicket(${t.n})">
      <div class="trow-num">${t.n}</div>
      <div class="trow-body">
        <div class="trow-title">${esc(t.title)}</div>
        <div class="trow-sub">${esc(t.summary)}</div>
        <div class="trow-tags"><span class="tag ${t.inbox==='positive'?'tag-pos':'tag-cat'}">${esc(t.cat)}</span></div>
      </div>
    </div>`).join('');
}

  const segs = raw.split(/\[\[(LOLA|AGENT|CUSTOMER)\]\]\s*/);
  let html = '<div class="thread">';
  for (let i = 1; i < segs.length; i += 2) {
    const type = segs[i], body = (segs[i+1]||'').trim();
    if (!body) continue;
    if (type === 'CUSTOMER') html += `<div class="msg"><div class="ava cust">C</div><div class="mcontent"><div class="mmeta"><span class="msender">Customer</span></div><div class="card">${esc(body)}</div></div></div>`;
    else if (type === 'LOLA') html += `<div class="msg out"><div class="ava lola">L</div><div class="mcontent"><div class="mmeta"><span class="msender">Lola</span><span class="auto-chip">automated</span></div><div class="card lola">${esc(body)}</div></div></div>`;
    else html += `<div class="msg out"><div class="ava agent">H</div><div class="mcontent"><div class="mmeta"><span class="msender">Healf</span></div><div class="card agent">${esc(body)}</div></div></div>`;
  }
  return html + '</div>';
}
function macroOptions() {
  return '<option value="">Insert a macro…</option>' + macros.map((m,i) => `<option value="${i}">${esc(m.name)}</option>`).join('');
}
function insertMacro(sel) {
  const i = sel.value; if (i === '') return;
  const ta = document.getElementById('co-reply');
  ta.value = (ta.value ? ta.value + '\n\n' : '') + (macros[i].body || '');
  sel.value = '';
}
function openTicket(n) {
  const t = TICKETS.find(x => x.n === n);
  document.getElementById('tlist').style.display = 'none';
  const d = document.getElementById('detail');
  d.style.display = 'flex';
  const prodHtml = t.prod ? `<div class="prod"><div class="prod-brand">${esc(t.prod.brand)}</div><div class="prod-name">${t.prod.link ? `<a href="${t.prod.link}" target="_blank" rel="noopener">${esc(t.prod.name)}</a>` : esc(t.prod.name)}</div></div>` : '<div style="font-size:12px;color:#9ca3af">No single product on this one.</div>';
  d.innerHTML = `
    <div class="detail-head">
      <button class="detail-back" onclick="selectInbox('${t.inbox}')">‹ Back to ${INBOXES.find(i=>i.id===t.inbox).label}</button>
      <div class="detail-title">${esc(t.title)}</div>
      <div class="detail-tags"><span class="tag ${t.inbox==='positive'?'tag-pos':'tag-cat'}">${esc(t.cat)}</span></div>
      <div class="detail-links">
        ${t.slack ? `<a class="linkbtn slack" href="${t.slack}" target="_blank" rel="noopener">${ICON.ext} Slack thread</a>` : ''}
        ${t.gg ? `<a class="linkbtn" href="${GG}${t.gg}" target="_blank" rel="noopener">${ICON.ext} Gorgias ticket</a>` : ''}
      </div>
    </div>
    <div class="detail-body">
      <div class="thread-col">
        <div class="summary-box"><div class="lbl">Summary</div>${esc(t.summary)}</div>
        <div class="thread-lbl">The full thread</div>
        ${renderThread(THREADS[t.gg] || '')}
        <div class="questions">
          <div class="q"><div class="q-num">1</div><div class="q-text">${Q[0]}</div></div>
        </div>
        <div class="composer">
          <div class="composer-bar"><select onchange="insertMacro(this)">${macroOptions()}</select></div>
          <textarea id="co-reply" placeholder="Try it yourself — draft the reply you'd have sent…"></textarea>
          <div class="actions-label">Actions — the steps you'd take (Shopify / Swap / Recharge etc.)</div>
          <textarea class="actions" placeholder="e.g. Cancel the order, MO the alternative, flag the PDP, log the GXO error…"></textarea>
          <div class="composer-note">Scratch space for discussion — not saved.</div>
        </div>
        <div class="questions" style="margin-top:22px">
          <div class="q"><div class="q-num">2</div><div class="q-text">${Q[1]}</div></div>
        </div>
      </div>
      <div class="side-col">
        <div class="side-title">Product</div>
        ${prodHtml}
      </div>
    </div>`;
}

(async () => { await loadMacros(); renderNav(); selectInbox('ops'); })();
</script>
</body>
</html>
