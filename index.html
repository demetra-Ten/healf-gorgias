<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healf Support Training</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  background: #f4f4f8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  width: 380px;
  padding: 36px 32px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.logo-mark {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo-text { font-size: 18px; font-weight: 700; color: #111; }
.logo-sub { font-size: 12px; color: #9ca3af; margin-top: 1px; }
h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 6px; }
p.sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid #e5e7eb;
  border-radius: 7px;
  font-size: 13px;
  font-family: inherit;
  color: #111;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.15s;
}
input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
button {
  width: 100%;
  padding: 10px;
  background: #7c3aed;
  color: #fff;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
button:hover { background: #6d28d9; }
button:disabled { background: #c4b5fd; cursor: not-allowed; }
.error {
  background: #fef2f2;
  border: 1px solid #fecaca;
  color: #dc2626;
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 12px;
  margin-bottom: 14px;
  display: none;
}
.footer-note {
  text-align: center;
  font-size: 11px;
  color: #9ca3af;
  margin-top: 20px;
}
.footer-note a { color: #7c3aed; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">healf</div>
    <div>
      <div class="logo-text">Healf</div>
      <div class="logo-sub">Support Training</div>
    </div>
  </div>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to continue your training.</p>
  <div class="error" id="error-msg"></div>
  <label for="email">Email address</label>
  <input type="email" id="email" placeholder="you@healf.com" autocomplete="email" />
  <label for="pin">PIN</label>
  <input type="password" id="pin" placeholder="••••" maxlength="6" autocomplete="current-password" />
  <button id="login-btn" onclick="login()">Sign in</button>
  <div class="footer-note"><a href="admin.html">Admin panel →</a></div>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pin   = document.getElementById('pin').value.trim();
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('error-msg');
  err.style.display = 'none';

  if (!email || !pin) { showError('Please enter your email and PIN.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { data, error } = await db
    .from('trainees')
    .select('*')
    .eq('email', email)
    .eq('pin', pin)
    .single();

  if (error || !data) {
    showError('Incorrect email or PIN. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  sessionStorage.setItem('trainee', JSON.stringify(data));
  window.location.href = 'practice.html';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
