<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #222; -webkit-font-smoothing: antialiased; }

/* ── BRAND HEADER (left nav) ── */
.ln-brand { display: flex; align-items: center; gap: 9px; padding: 13px 14px 11px; flex-shrink: 0; }
.ln-logomark { width: 24px; height: 24px; border-radius: 6px; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; letter-spacing: -0.5px; }
.ln-brand-text { font-size: 14px; font-weight: 600; color: #1b1c1d; }

/* ── APP ── */
.app { display: flex; flex: 1; overflow: hidden; }

/* ── LEFT NAV ── */
.leftnav { width: 220px; min-width: 220px; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.leftnav-top { padding: 10px 10px 4px; }
.nav-section-label { font-size: 13px; font-weight: 500; color: #5f5e5c; padding: 12px 12px 5px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.nav-section-label:hover { color: #1b1c1d; }
.nav-section-caret { font-size: 9px; color: #9ca3af; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-radius: 6px; cursor: pointer; color: #1b1c1d; font-size: 13.5px; margin-bottom: 1px; }
.nav-item:hover { background: #f4f4f5; }
.nav-item.active { background: #efeef2; color: #1b1c1d; font-weight: 500; }
.nav-item-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
.nav-item-icon { color: #6b7280; width: 18px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-item-icon svg { width: 16px; height: 16px; display: block; }
.nav-item.active .nav-item-icon { color: #7c3aed; }
.nav-item-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-count { font-size: 12px; font-weight: 600; color: #5f5e5c; flex-shrink: 0; }
.nav-item.active .nav-count { color: #7c3aed; }
.nav-count.red { color: #dc2626; }
.nav-count.amber { color: #d97706; }
.nav-divider { height: 1px; background: #f3f4f6; margin: 6px 0; }
.nav-sub { padding-left: 18px; }
.nav-sub .nav-item { font-size: 12px; color: #6b7280; }
.nav-sub .nav-item:hover { color: #374151; }
.nav-locked { opacity: 0.45; cursor: default; }
.nav-locked:hover { background: none !important; }
.nav-active-badge { font-size: 9px; background: #7c3aed; color: #fff; padding: 1px 5px; border-radius: 4px; margin-left: 3px; flex-shrink: 0; }
.leftnav-footer { position: relative; margin-top: auto; padding: 10px 12px; border-top: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; }
.trainee-info { display: flex; align-items: center; gap: 8px; }
.trainee-avatar { width: 28px; height: 28px; border-radius: 50%; background: #7c3aed; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; flex-shrink: 0; }
.trainee-name-sm { font-size: 12px; font-weight: 600; color: #111; }
.trainee-email-sm { font-size: 10px; color: #9ca3af; }
.footer-icons { display: flex; gap: 10px; color: #9ca3af; }
.footer-icons span { cursor: pointer; display: inline-flex; align-items: center; }
.footer-icons svg { width: 16px; height: 16px; display: block; }
.footer-icons span:hover { color: #374151; }

/* ── MAIN ── */
.main-area { flex: 1; display: flex; overflow: hidden; flex-direction: column; }

/* ── TICKET TABLE VIEW ── */
.ticket-table-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.ttv-header { padding: 16px 24px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; background: #fff; }
.ttv-title { font-size: 16px; font-weight: 700; color: #111; display: flex; align-items: center; gap: 8px; }
.ttv-icon { color: #6b7280; display: inline-flex; align-items: center; }
.ttv-icon svg { width: 18px; height: 18px; display: block; }
.reply-channel-btn svg, .macro-trigger svg, .td-back svg { display: block; flex-shrink: 0; }
.cs-title-user { display: flex; align-items: center; gap: 6px; text-transform: none; font-size: 13px; letter-spacing: normal; font-weight: 600; color: #1b1c1d; }
.cs-title-user svg { color: #6b7280; flex-shrink: 0; }
.ttv-count { font-size: 12px; color: #6b7280; font-weight: 400; }
.ttv-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.ttv-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; font-size: 12px; color: #374151; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; }
.ttv-btn:hover { background: #f9fafb; }
.ttv-tabs { display: flex; gap: 2px; padding: 0 20px; border-bottom: 1px solid #e5e7eb; background: #fff; flex-shrink: 0; }
.ttv-tab { border: none; background: none; font-family: inherit; font-size: 13px; color: #6b7280; padding: 11px 8px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 7px; }
.ttv-tab:hover { color: #1b1c1d; }
.ttv-tab.active { color: #1b1c1d; font-weight: 600; border-bottom-color: #7c3aed; }
.ttv-tab-count { font-size: 11px; font-weight: 600; color: #9ca3af; background: #f3f4f6; padding: 1px 7px; border-radius: 9px; }
.ttv-tab.active .ttv-tab-count { background: #ede9fe; color: #7c3aed; }
.ticket-table-wrap { flex: 1; overflow-y: auto; }
table.ticket-table { width: 100%; border-collapse: collapse; }
table.ticket-table thead th { padding: 9px 16px; text-align: left; font-size: 11px; font-weight: 600; color: #9ca3af; border-bottom: 1px solid #e5e7eb; background: #fff; position: sticky; top: 0; white-space: nowrap; cursor: pointer; user-select: none; }
table.ticket-table thead th:hover { color: #374151; }
table.ticket-table thead th:first-child { width: 36px; padding-right: 0; }
table.ticket-table tbody tr { cursor: pointer; border-bottom: 1px solid #f3f4f6; transition: background 0.08s; }
table.ticket-table tbody tr:hover { background: #f9fafb; }
table.ticket-table tbody tr.active-row { background: #f5f3ff; }
table.ticket-table tbody td { padding: 11px 16px; font-size: 12.5px; color: #374151; vertical-align: middle; }
table.ticket-table tbody td:first-child { width: 36px; padding-right: 0; }
.tt-checkbox { width: 14px; height: 14px; accent-color: #7c3aed; cursor: pointer; }
.tt-subject { font-weight: 600; color: #111; margin-bottom: 2px; }
.tt-preview { font-size: 11px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
.tt-assignee { font-size: 12px; color: #6b7280; }
.tt-time { font-size: 12px; color: #374151; white-space: nowrap; }
.tt-time.bold { font-weight: 600; color: #111; }
.tt-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot-open { background: #7c3aed; }
.dot-score-3 { background: #22c55e; }
.dot-score-2 { background: #f59e0b; }
.dot-score-1 { background: #ef4444; }

/* ── TICKET DETAIL (replaces table when ticket open) ── */
.ticket-detail { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.td-topbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 20px; height: 46px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.td-back { color: #9ca3af; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; border: none; background: none; font-family: inherit; padding: 4px 8px; border-radius: 5px; }
.td-back:hover { background: #f3f4f6; color: #374151; }
.td-breadcrumb-sep { color: #d1d5db; }
.td-subject { font-weight: 700; font-size: 13px; color: #111; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; flex-shrink: 0; }
.badge-open { background: #ede9fe; color: #5b21b6; border: 1px solid #ddd6fe; }
.badge-submitted { background: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; }
.badge-score-3 { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
.badge-score-2 { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
.badge-score-1 { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
.td-btn { padding: 4px 11px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; font-size: 12px; color: #374151; cursor: pointer; font-family: inherit; }
.td-btn:hover { background: #f9fafb; }

/* MESSAGES */
.td-body { display: flex; flex: 1; overflow: hidden; }
.messages-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; background: #f9fafb; }
.msg-wrap { display: flex; gap: 10px; align-items: flex-start; }
.msg-wrap.out { flex-direction: row-reverse; }
.msg-ava { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; }
.msg-ava.customer { background: #e5e7eb; color: #374151; }
.msg-ava.agent { background: #7c3aed; color: #fff; }
.msg-ava.lola { background: #ede9fe; color: #7c3aed; }
.msg-content { display: flex; flex-direction: column; align-items: flex-start; max-width: 74%; min-width: 0; }
.msg-wrap.out .msg-content { align-items: flex-end; }
.msg-meta { font-size: 11px; color: #9ca3af; margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
.msg-sender { font-weight: 600; color: #374151; }
.auto-chip { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; background: #ede9fe; color: #7c3aed; padding: 1px 6px; border-radius: 4px; }
.msg-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 16px; font-size: 13px; line-height: 1.6; color: #374151; }
.msg-card.agent-card { background: #f5f3ff; border-color: #c4b5fd; }
.msg-card.lola-card { background: #f4f4f5; border-color: #e9e9ec; }

/* REPLY BOX */
.reply-box { border-top: 1px solid #e5e7eb; background: #fff; flex-shrink: 0; }
.reply-to-row { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
.reply-channel-btn { display: flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 5px; border: 1px solid #e5e7eb; background: #fff; font-size: 12px; color: #374151; cursor: pointer; font-family: inherit; }
.reply-to-label { color: #9ca3af; }
.reply-to-val { color: #374151; font-weight: 500; }
.reply-textarea { width: 100%; border: none; outline: none; padding: 10px 16px 12px; font-size: 13px; font-family: inherit; resize: none; min-height: 40px; height: 110px; color: #374151; background: #fff; line-height: 1.55; }
.reply-textarea::placeholder { color: #9ca3af; }
.actions-note-wrap { border-top: 1px dashed #e5e7eb; background: #fbfaff; padding: 0 16px 4px; }
.actions-note-label { font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
.actions-textarea { width: 100%; border: none; outline: none; padding: 4px 0 8px; font-size: 12.5px; font-family: inherit; resize: none; min-height: 32px; height: 64px; color: #374151; background: transparent; line-height: 1.5; }
.actions-textarea::placeholder { color: #b6bac2; }
.drag-handle { height: 9px; cursor: ns-resize; display: flex; align-items: center; justify-content: center; background: inherit; touch-action: none; }
.drag-handle::before { content: ''; width: 26px; height: 3px; border-radius: 2px; background: #e5e7eb; transition: background 0.12s; }
.drag-handle:hover::before { background: #cbd5e1; }
.drag-handle.dragging::before { background: #7c3aed; }
.cs-items { margin-top: 6px; }
.li { padding: 7px 0; border-bottom: 1px solid #f3f4f6; }
.li:last-child { border-bottom: none; padding-bottom: 0; }
.li-brand { font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 1px; }
.li-name { font-size: 12px; color: #374151; font-weight: 500; }
.li-name a { color: #7c3aed; text-decoration: none; }
.li-name a:hover { text-decoration: underline; }
.li-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.tt-group td { background: #f9fafb; padding: 8px 16px; border-bottom: 1px solid #eceef1; }
.tt-group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; }
.tt-group-count { display: inline-block; margin-left: 8px; font-size: 10px; font-weight: 600; background: #e5e7eb; color: #6b7280; padding: 1px 7px; border-radius: 8px; }
.tt-empty { text-align: center; padding: 20px; color: #9ca3af; font-size: 12px; }
.reply-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-top: 1px solid #f3f4f6; }
.reply-hint { font-size: 11px; color: #9ca3af; }
.reply-actions { display: flex; gap: 8px; }
.macro-bar { position: relative; padding: 8px 16px 0; }
.macro-trigger { display: inline-flex; align-items: center; gap: 5px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #374151; cursor: pointer; font-family: inherit; }
.macro-trigger:hover { background: #ede9fe; color: #5b21b6; border-color: #ddd6fe; }
.macro-picker { display: none; position: absolute; bottom: calc(100% + 6px); left: 16px; width: 440px; max-width: calc(100% - 32px); background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.16); z-index: 60; overflow: hidden; }
.macro-picker.open { display: block; }
.macro-search { width: 100%; border: none; border-bottom: 1px solid #f3f4f6; padding: 10px 14px; font-size: 13px; font-family: inherit; outline: none; color: #111; }
.macro-list { max-height: 300px; overflow-y: auto; }
.macro-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid #f9fafb; }
.macro-item:last-child { border-bottom: none; }
.macro-item:hover { background: #ede9fe; }
.macro-item-cat { font-size: 9px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.4px; }
.macro-item-name { font-size: 12.5px; font-weight: 600; color: #374151; }
.macro-item-preview { font-size: 11px; color: #9ca3af; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.macro-empty { padding: 18px; text-align: center; color: #9ca3af; font-size: 12px; }
.submit-btn { padding: 7px 18px; background: #111827; color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.submit-btn:hover { background: #374151; }
.submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
.send-close-btn { padding: 7px 14px; background: #fff; color: #374151; border: 1px solid #e5e7eb; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.send-close-btn:hover { background: #f9fafb; }

/* SUBMITTED BANNER */
.submitted-banner { background: #f0fdf4; border-top: 1px solid #bbf7d0; padding: 18px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.submitted-title { font-weight: 700; font-size: 14px; color: #166534; }
.submitted-sub { font-size: 12px; color: #4b7a55; margin-top: 2px; }
.score-display { margin-left: auto; text-align: center; background: #fff; border: 1px solid #bbf7d0; border-radius: 8px; padding: 8px 16px; }
.score-val { font-size: 22px; font-weight: 800; color: #7c3aed; }
.score-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
.feedback-box { background: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 8px; padding: 12px 16px; margin: 0 20px 14px; font-size: 13px; color: #374151; line-height: 1.55; }

/* CUSTOMER SIDEBAR */
.customer-sidebar { width: 256px; min-width: 240px; background: #fff; border-left: 1px solid #e5e7eb; overflow-y: auto; flex-shrink: 0; }
.cs-section { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; }
.cs-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #9ca3af; margin-bottom: 10px; }
.cs-name { font-size: 14px; font-weight: 700; color: #111; }
.cs-email { font-size: 12px; color: #7c3aed; margin-top: 2px; }
.cs-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid #f9fafb; }
.cs-row:last-child { border-bottom: none; }
.cs-label { font-size: 12px; color: #9ca3af; }
.cs-value { font-size: 12px; color: #374151; font-weight: 500; text-align: right; }
.order-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; }
.order-num { font-size: 11px; font-weight: 700; color: #7c3aed; }
.order-status-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; margin-top: 5px; }
.os-fulfilled { background: #dcfce7; color: #166534; }
.os-partial { background: #dbeafe; color: #1d4ed8; }
.os-unfulfilled { background: #fef9c3; color: #854d0e; }
.os-cancelled { background: #fee2e2; color: #991b1b; }
.loyalty-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; }
.loyalty-bronze { background: #fef3c7; color: #92400e; }
.loyalty-silver { background: #f3f4f6; color: #374151; }
.loyalty-gold { background: #fef9c3; color: #713f12; }
.loyalty-vip { background: #ede9fe; color: #5b21b6; }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
.loading-spinner { width: 30px; height: 30px; border: 3px solid #e5e7eb; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #9ca3af; font-size: 13px; }
.tv-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #9ca3af; background: #f9fafb; }
.tv-empty-icon { font-size: 40px; opacity: 0.2; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 99px; }

/* AGENT NOTES + tidy classes (so they theme correctly) */
.cs-addtag { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px dashed #d1d5db; border-radius: 14px; font-size: 11px; color: #6b7280; cursor: pointer; background: none; font-family: inherit; margin-bottom: 8px; }
.cs-cr { padding: 5px 0; }
.cs-cr .cs-label { display: block; margin-bottom: 4px; }
.cs-cr-select { width: 100%; font-family: inherit; font-size: 12px; color: #374151; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 6px 8px; cursor: pointer; }
.cs-cr-select:focus { outline: none; border-color: #7c3aed; }
.cs-add { font-size: 11px; color: #7c3aed; cursor: pointer; }
.cs-more { font-size: 11px; color: #7c3aed; cursor: pointer; margin-top: 6px; }

function ticketProducts(t) { return (t && (t.order_items || PRODUCTS_BY_ID[t.id])) || ''; }
function renderProducts(str) {
  if (!str) return '';
  return str.split('\n').filter(l => l.trim()).map(line => {
    let brand = '';
    const bm = line.match(/@@\s*(.+?)\s*$/);        // brand stored as "… @@Vendor"
    if (bm) { brand = bm[1].trim(); line = line.replace(/\s*@@.*$/, ''); }
    const m = line.match(/^\[([^\]]+)\]\(([^)]+)\)\s*(.*)$/);
    let name, url = '', rest = '';
    if (m) { name = m[1]; url = m[2]; rest = m[3]; } else { name = line; }
    let qty = '', price = '';
    const qm = rest.match(/\(x?(\d+)\)/i); if (qm) qty = '×' + qm[1];
    const pm = rest.match(/£[\d.,]+/); if (pm) price = pm[0];
    const meta = [qty, price].filter(Boolean).join(' · ');  // no status text — matches how Gorgias shows order lines
    const title = url ? `<a href="${url}" target="_blank" rel="noopener">${name}</a>` : name;
    return `<div class="li">${brand ? `<div class="li-brand">${brand}</div>` : ''}<div class="li-name">${title}</div>${meta ? `<div class="li-meta">${meta}</div>` : ''}</div>`;
  }).join('');
}

  document.getElementById('footer-signout').innerHTML = ICONS.logout;

  const { data: fresh } = await db.from('trainees').select('*').eq('id', trainee.id).single();
  if (fresh) { trainee = fresh; sessionStorage.setItem('trainee', JSON.stringify(fresh)); }

  const initial = trainee.name.charAt(0).toUpperCase();

      .from('tickets')

function initials(name) { return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase(); }
function getSub(ticketId) { return submissions.find(s => s.ticket_id === ticketId); }

function relativeTime() { return 'Today'; }

function scoreDotClass(s) { return s >= 3 ? 'dot-score-3' : s == 2 ? 'dot-score-2' : 'dot-score-1'; }
function scoreBadgeClass(s) { return s >= 3 ? 'badge-score-3' : s == 2 ? 'badge-score-2' : 'badge-score-1'; }
// Normalise any raw order status to one of the three real Shopify fulfilment states.
function fulfilment(raw) {
  if (!raw) return null;
  const s = String(raw).toLowerCase();
  if (s.includes('cancel')) return { label: 'Cancelled', cls: 'os-cancelled' };
  if (s.includes('partial')) return { label: 'Partially fulfilled', cls: 'os-partial' };
  if (s.includes('deliver') || s.includes('shipped') || s === 'fulfilled') return { label: 'Fulfilled', cls: 'os-fulfilled' };
  return { label: 'Unfulfilled', cls: 'os-unfulfilled' };
}

  if (!tickets.length) { tbody.innerHTML = emptyRow('No tickets in this category yet.'); return; }

// A ticket's `message` may be a thread: segments separated by [[LOLA]] / [[AGENT]] / [[CUSTOMER]]
// marker lines. No markers = a single customer message (backward compatible).
function parseThread(ticket) {
  const raw = ticket.message || '';
  if (!/\[\[(LOLA|AGENT|CUSTOMER)\]\]/.test(raw)) return [{ type: 'CUSTOMER', body: raw }];
  const segs = raw.split(/\[\[(LOLA|AGENT|CUSTOMER)\]\]\s*/);
  const parts = [];
  for (let i = 1; i < segs.length; i += 2) {
    const body = (segs[i + 1] || '').trim();
    if (body) parts.push({ type: segs[i], body });
  }
  return parts.length ? parts : [{ type: 'CUSTOMER', body: raw }];
}
// The customer's own message (last customer turn) — for the table preview and scorer.
function customerMessage(ticket) {
  const c = parseThread(ticket).filter(p => p.type === 'CUSTOMER').pop();
  return c ? c.body : (ticket.message || '');
}
// Readable full thread for the scorer (labels each turn).
function threadText(ticket) {
  return parseThread(ticket).map(p => {
    const who = p.type === 'CUSTOMER' ? `Customer (${ticket.customer_name})`
      : p.type === 'LOLA' ? 'Earlier automated email from Lola (Healf)'
      : 'Earlier Healf reply';
    return `${who}:\n${p.body}`;
  }).join('\n\n');
}

function renderMessages(ticket, sub) {
  const area = document.getElementById('messages-area');
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
  const bubble = (o) => `
    <div class="msg-wrap ${o.dir}">
      <div class="msg-ava ${o.avaClass}">${o.ava}</div>
      <div class="msg-content">
        <div class="msg-meta"><span class="msg-sender">${o.sender}</span>${o.automated ? '<span class="auto-chip">automated</span>' : ''}<span>${o.sub}</span></div>
        <div class="msg-card ${o.cardClass || ''}">${esc(o.body)}</div>
      </div>
    </div>`;
  let html = parseThread(ticket).map(p => {
    if (p.type === 'CUSTOMER') return bubble({ dir:'in', avaClass:'customer', ava:initials(ticket.customer_name), sender:ticket.customer_name, sub:ticket.customer_email, body:p.body });
    if (p.type === 'LOLA') return bubble({ dir:'out', avaClass:'lola', ava:'L', sender:'Lola', automated:true, sub:'team@healf.com', body:p.body, cardClass:'lola-card' });
    return bubble({ dir:'out', avaClass:'agent', ava:'H', sender:'Healf', sub:'team@healf.com', body:p.body, cardClass:'agent-card' });
  }).join('');
  if (sub) html += bubble({ dir:'out', avaClass:'agent', ava:trainee.name.charAt(0).toUpperCase(), sender:`${trainee.name} (you)`, sub:new Date(sub.submitted_at).toLocaleString('en-GB',{dateStyle:'short',timeStyle:'short'}), body:sub.reply_text, cardClass:'agent-card' });
  area.innerHTML = html;
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

function renderReplySection(ticket, sub) {
  const section = document.getElementById('reply-section');
  if (sub) {
    if (sub.scoring) {
      section.innerHTML = `
        <div class="submitted-banner">
          <div>
            <div class="submitted-title">Scoring your reply…</div>
            <div class="submitted-sub">Marking against the ideal handling — this takes a few seconds.</div>
          </div>
        </div>`;
      return;
    }
    const scored = sub.score != null && sub.score !== undefined;
    let rf = sub.response_feedback || '';
    let af = sub.actions_feedback || '';
    // On reload the split fields aren't in the DB — recover them from the stored
    // combined `feedback` ("Response: … \n\nActions: …") so feedback is never lost.
    if (!rf && !af && sub.feedback) {
      const m = sub.feedback.match(/Response:\s*([\s\S]*?)\n\nActions:\s*([\s\S]*)$/);
      if (m) { rf = m[1].trim(); af = m[2].trim(); }
      else { rf = sub.feedback.trim(); }

    const fbHtml = scored
      ? `<div class="feedback-box">
           <div style="margin-bottom:12px"><strong>Response</strong><br>${(rf || '—').replace(/\n/g,'<br>')}</div>
           <div><strong>Actions</strong><br>${(af || '—').replace(/\n/g,'<br>')}</div>
         </div>`
      : (sub.feedback ? `<div class="feedback-box"><strong>Trainer feedback:</strong><br>${sub.feedback.replace(/\n/g,'<br>')}</div>` : '');
    section.innerHTML = `
      ${fbHtml}
      <div class="submitted-banner">
        <div>
          <div class="submitted-title">Reply submitted</div>
          <div class="submitted-sub">${scored ? 'Scored automatically against the ideal handling.' : (sub.scoreError ? 'Saved, but auto-scoring couldn\'t run just now.' : 'Awaiting review.')}</div>
        </div>
        ${scored ? `<div class="score-display"><div class="score-val">${sub.score}/3</div><div class="score-label">Score</div></div>` : ''}
      </div>`;
  } else {
    section.innerHTML = `
      <div class="reply-box">
        <div class="reply-to-row">
          <button class="reply-channel-btn">${ICONS.mail} Email ▾</button>
          <span class="reply-to-label">To:</span>

function mEsc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleMacroPicker(e) {

  if (open) {
    renderMacroList('');

    if (s) { s.value = ''; s.focus(); }
  }
}

function renderMacroList(q) {
  const list = document.getElementById('macro-list');
  if (!list) return;
  if (!macros.length) {
    list.innerHTML = '<div class="macro-empty">No macros loaded yet. Run macros.sql in Supabase to add them.</div>';
    return;
  }
  const ql = (q || '').toLowerCase();
  const matches = macros.filter(m => m.name.toLowerCase().includes(ql) || (m.category || '').toLowerCase().includes(ql));
  if (!matches.length) { list.innerHTML = '<div class="macro-empty">No macros match that search.</div>'; return; }
  list.innerHTML = matches.map(m => `
    <div class="macro-item" onclick="insertMacro(${m.id})">
      <div class="macro-item-cat">${mEsc(m.category)}</div>
      <div class="macro-item-name">${mEsc(m.name)}</div>
      <div class="macro-item-preview">${mEsc(m.body.replace(/\n/g,' ').slice(0,100))}</div>
    </div>`).join('');
}

function filterMacros() {
  const s = document.getElementById('macro-search');
  renderMacroList(s ? s.value : '');
}

function insertMacro(id) {
  const m = macros.find(x => x.id === id);
  if (!m) return;
  const t = tickets.find(x => x.id === activeTicketId);
  const first = (t && t.customer_name) ? t.customer_name.split(' ')[0] : 'there';
  const body = m.body.replace(/\{\{\s*ticket\.customer\.firstname\s*\}\}/g, first);
  usedMacro = { name: m.name, body: body };
  const input = document.getElementById('reply-input');
  if (input) { input.value = body; input.style.border = 'none'; input.focus(); }
  const p = document.getElementById('macro-picker');
  if (p) p.classList.remove('open');
}

// Independently drag-resize the reply and actions boxes (drag handle up = taller, down = flatter)
let _resize = null;
document.addEventListener('pointerdown', e => {
  const handle = e.target.closest('.drag-handle');
  if (!handle) return;
  const ta = document.getElementById(handle.dataset.target);
  if (!ta) return;
  _resize = { ta, handle, startY: e.clientY, startH: ta.offsetHeight };
  handle.classList.add('dragging');
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('pointermove', e => {
  if (!_resize) return;
  const next = _resize.startH + (_resize.startY - e.clientY); // drag up → taller
  _resize.ta.style.height = Math.max(34, Math.min(window.innerHeight * 0.6, next)) + 'px';
});
document.addEventListener('pointerup', () => {
  if (!_resize) return;
  _resize.handle.classList.remove('dragging');
  document.body.style.userSelect = '';
  _resize = null;
});

async function submitReply(ticketId, andClose) {
  const input = document.getElementById('reply-input');
  const reply = input ? input.value.trim() : '';
  if (!reply) { if (input) { input.style.border = '1px solid #ef4444'; input.placeholder = 'Please write a reply first.'; } return; }
  // Contact reason is required before a ticket can be sent/closed (like Gorgias)
  if (!contactReasons[ticketId]) {
    const sel = document.querySelector('.cs-cr-select');
    if (sel) { sel.style.borderColor = '#ef4444'; sel.focus(); }
    const hint = document.querySelector('.reply-hint');
    if (hint) { hint.textContent = '⚠ Assign a contact reason before sending.'; hint.style.color = '#ef4444'; }
    return;
  }
  const actionsInput = document.getElementById('actions-input');
  const actions = actionsInput ? actionsInput.value.trim() : '';

  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  const { data, error } = await db.from('submissions').insert({
    trainee_id: trainee.id, ticket_id: ticketId, reply_text: reply, actions_text: actions
  }).select().single();

  if (error) { if (btn) { btn.disabled = false; btn.textContent = 'Send'; } alert('Error: ' + error.message); return; }

  submissions.push(data);
  const ticket = tickets.find(t => t.id === ticketId);
  renderMessages(ticket, data);

  // Show scoring-in-progress
  data.scoring = true;
  renderReplySection(ticket, data);
  const badge = document.getElementById('td-status-badge');
  badge.textContent = 'Scoring…';
  badge.className = 'td-status-badge badge-submitted';

  // Auto-score via the n8n webhook
  try {
    const res = await fetch(SCORING_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        submission_id: data.id, ticket_id: ticketId,
        reply_text: reply, actions_text: actions,
        macro_name: usedMacro ? usedMacro.name : null,
        macro_body: usedMacro ? usedMacro.body : null,
        customer_name: ticket.customer_name, message: threadText(ticket),
        contact_reason: contactReasons[ticketId] || null,
        ideal_response: ticket.ideal_response, order_items: ticketProducts(ticket),
        order_value: ticket.order_value, order_status: ticket.order_status
      })
    });
    if (!res.ok) throw new Error('scoring ' + res.status);
    const result = await res.json();
    data.score = result.score;
    data.response_feedback = result.response_feedback;
    data.actions_feedback = result.actions_feedback;
    data.feedback = 'Response: ' + (result.response_feedback || '') + '\n\nActions: ' + (result.actions_feedback || '');
  } catch (e) {
    data.scoreError = true;
  }
  data.scoring = false;

  renderTicketTable();
  renderMessages(ticket, data);
  renderReplySection(ticket, data);
  const badge2 = document.getElementById('td-status-badge');
  if (data.score != null) { badge2.textContent = `${data.score}/3`; badge2.className = `td-status-badge ${scoreBadgeClass(data.score)}`; }
  else { badge2.textContent = 'Submitted'; badge2.className = 'td-status-badge badge-submitted'; }
}

tion provided by Healf and the ensuing trouble and adverse experience in attempting to get to the truth, it appears from your email that your offer is contingent upon me\r accepting the incorrect item. I hope not as that would be a conditional apology.\nAgain, in reliance upon the item advertised by Healf being correct, the order was placed however the item delivered was not as advertised. As such I exercise my right to rescind the contract and appreciate your offer of a generous gift card by way of apology\r for the experience in remedying Healf's error.\nKind regards\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for your email, and apologies if my previous message came across as conditional - that wasn't my intention.\n\nI also want to flag something relevant here: the creatine was the free product included as part of the 4-for-3 promotion on your order, so you weren't actually charged for it. Given that, you're welcome to keep it, or return it using the QR code below I've attached below if you'd rather not have it. Either way, there's no cost to you either way.\n\nSeparately, and regardless of what you decide on the item, I've arranged a £50 gift card as an apology for the incorrect information you were given. I have sent this in a separate email. This isn't contingent on anything, it's simply an apology for how this was handled.\n\nThank you again for your patience while we got this right, and please do let me know if you have any questions.\n\nWith Healf,\n\nHarriet\nCustomer Wellbeing Manager & AfN Nutritionist", "272382970": "[[CUSTOMER]]\nNew Contact Form Submission Name: [name] Email: [email] (mailto:[email]) Phone: Not Provided\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[AGENT]]\nHi [name],\n\nThank you for getting in touch.\n\nI completely understand your concern, and thank you for bringing this to our attention.\n\nTo ensure I provide you with the most accurate information, I'm going to get in touch with the brand owner to confirm whether the current stock of the Momentous Omega-3 and Creatine is NSF Certified for Sport®, and to clarify why the NSF logo isn't shown on the packaging and why the batch numbers don't appear on the NSF website.\n\nAs soon as I have an update, I'll get back to you straight away.\n\nThank you for your patience, and please let me know if you have any other questions in the meantime.\n\nWith Healf,\n\nGrace\ncustomer wellbeing executive\n[[CUSTOMER]]\nHi\nOkay thank you so much, and it’s momentous’s website it isn’t on, am not sure about NSF’s. But I have paid for a premium product for the reason that it's NSF certified so I know am getting the most premium quality, and is safe for the athletes I represent, so now until you come\r back to me with proof I have to wait to be able to use them! If am paying a premium for products that are NSF certified then I expect the products to have the NSF label! I am hesitant to use them still as they no longer use creapure in there creatine\r either!\nKind regards\n[name] Sent from Outlook for iOS (https://aka.ms/o0ukef)\n[[AGENT]]\nHi [name],\n\nThank you for getting back to us, and I completely understand your concerns.\n\nGiven the reason you purchased the product, it's entirely understandable that you want confirmation before using it. I appreciate that NSF certification is important to you and the athletes you work with.\n\nWhile we're waiting for a response from the brand, would you mind sending me a few photos of the product you received?\n\nIf possible, could you include:\nPhotos of all sides of the packaging, especially the label.\nA clear photo of the batch number and expiry date.\n\nThis will allow us to compare your product with the information we have and provide the brand with everything they need to investigate.\n\nThank you again for your patience. I'll continue to follow this up and will update you as soon as I hear back from the brand.\n\nWith Healf,\n\nLea\nCustomer Wellbeing Executive\n[[CUSTOMER]]\nHi\nThank you so much for the quick response, it’s greatly appreciated. Of course here are the photos attached.\nYes until I have it confirmed, I can’t use it with the athletes I work with which is very frustrating, as again you pay for a premium product and I don’t know if I have received that. Could you ask them aswell about why the creatine isn’t creapure anymore.\nKind regards\n[name] Sent from Outlook for iOS (https://aka.ms/o0ukef)\n[[AGENT]]\nHi [name],\n\nThank you so much for sending the photos. I really appreciate you taking the time to do that.\nWhile we're waiting for the brand's response, I wanted to reassure you about how we select the products we stock at Healf.\n\nProduct authenticity and quality are extremely important to us. We don't simply list products on our website. Every brand goes through our Healf Curation Process before it's made available to our customers:\n\nhttps://healf.com/pages/curation\n\nOur process is built around 3 key stages:\nBrand discovery: We carefully select brands that share our long-term approach to wellbeing and quality.\nExpert validation: We review the formulation, ingredient quality, supporting research, and the brand's commitment to transparency.\nCommunity testing: We gather real customer feedback to understand how products perform in everyday use.\n\nWe work directly with our brand partners and authorised supply chains, so you can be confident that the products we sell are genuine.\n\nThat said, I completely understand why you've questioned the packaging. As you specifically purchased these products because of their NSF certification, it's important that we get a clear answer for you. Rather than making assumptions, I'd much rather wait for Momentous to confirm whether there has been a packaging update, certification change, or any other explanation for the differences you've noticed.\n\nThank you again for your patience while we investigate this. I'll come back to you as soon as I receiv\n[[AGENT]]\nHi [name],\n\nThank you so much for your patience while we continue to investigate. I completely understand how frustrating the wait can be, and I want to reassure you that we’re doing everything we can to get a clear update.\n\nThis remains a priority for us, and your understanding means a lot while we work to get this sorted. We'll be in touch as soon as possible.\n\nWith Healf,\n\nLea\nCustomer Wellbeing Executive", "269058019": "[[CUSTOMER]]\nNew Contact Form Submission Name: [name] Email: [email] (mailto:[email]) Phone: [phone]\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[AGENT]]\nHi [name],\n\nThank you for bringing this to our attention.\n\nWe checked the product information on the physical packaging we currently have, and we could not find Butylphenyl Methylpropional (Lilial) listed among the ingredients.\n\nIt therefore appears that the ingredient information displayed on our website may be outdated, and I sincerely apologise for the confusion this has caused.\n\nI've already requested that the product page be reviewed and updated to reflect the current ingredient information shown on the packaging.\n\nThank you again for flagging this to us. We really appreciate customers taking the time to bring potential discrepancies to our attention, as it helps us keep our product information accurate and up to date.\n\nPlease don't hesitate to get in touch if you have any further questions.\n\nWith Healf,\n\nLea\nCustomer Wellbeing Executive\nHealf Experience: Meet Andrew Huberman, Dr. Rhonda Patrick, and more at HX26 on 20-21 June — a weekend dedicated to your wellbeing. Tickets available here.", "270703878": "[[CUSTOMER]]\nHi there\nThe wrong item arrived in my order today.\nPlease see pictures of what should be and what was delivered.\nPlease send out the missing. Item asap.\nMany thanks\n[name]\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[AGENT]]\nHi [name],\n\nThank you for getting in touch. I'm so sorry to hear this and we'll investigate this at our warehouse to prevent future occurrences.\n\nI wasn't able to clearly identify the incorrect item from the photo. Would you mind letting us know the exact product name of the item you received instead?\n\nI also wanted to confirm that the only missing item is the SubLuna Kids Nourished Child: Ancestral Vitamin Gummy. I can see that the Women's Multivitamin Liposomal - Vanilla Peach hasn't been dispatched yet as it's currently out of stock and is expected to be available again on 2 July 2026.\n\nOnce we have the name of the incorrect item and your confirmation about the missing item, we'll get this resolved for you as quickly as possible.\n\nThank you for your patience, and please let us know if you have any questions in the meantime.\n\nWith Healf,\n\nJemaica\nCustomer Wellbeing Executive\n[[CUSTOMER]]\nHi\n\nYes it is SubLuna Kids Nourished Child: Ancestral Vitamin Gummy that is missing\n\nThanks\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for confirming that the missing item is the SubLuna Kids Nourished Child: Ancestral Vitamin Gummy.\n\nI can certainly send a replacement for that now.\n\nBefore I do, would you mind letting me know the name of the incorrect item you received? I wasn't able to identify it clearly from the photo, and this will help us investigate what went wrong with our warehouse team.\n\nAs soon as I have that, I'll make sure everything is processed for you.\n\nWith Healf,\n\nJemaica\nCustomer Wellbeing Executive\n[[CUSTOMER]]\nNo problem\nIt’s the reformed ceremonial grade matcha - happy to return it if you tell me how\nThanks\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for confirming that. I'm so sorry again about this and we'll investigate this at our warehouse to prevent future occurrences.\n\nI have sent your replacement to be processed in the warehouse now and you'll receive tracking details by email as soon as this is available so you can follow the journey of your parcel.\n\nWe're sending this to you with expedited shipping to ensure you receive it as soon as possible. You may have received an email mentioning a £5.99 invoice for the delivery however please disregard this, there’s definitely no payment required as we’re covering it!\n\nAs an apology, we would like to offer the option to keep the incorrect item. We hope you can enjoy this, or if you prefer, please feel free to gift it to someone who might!\n\nThank you so much for your patience with this and for your understanding throughout.\n\nWith Healf,\n\nJemaica\nCustomer Wellbeing Executive", "266840445": "[[CUSTOMER]]\nNew Contact Form Submission Name: [name] Email: [email] (mailto:[email]) Phone: Not Provided\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[AGENT]]\nHi [name],\n\nThank you so much for taking the time to write to us so thoughtfully and please know that we take your concerns very seriously. You've raised some genuinely important points and we're really grateful you flagged this.\nThe sachet included in your order was a complimentary sample of Youth & Earth V14 Longevity Reds — an all-in-one daily longevity supplement powder from the UK brand Youth & Earth. To give you full transparency, here's what it contains:\n\nThe formula combines 14 science-backed longevity ingredients including NMNH (cellular energy & NAD+ levels), Spermidine (cellular renewal), Calcium AKG (bone health), Trans-Resveratrol (antioxidant protection), Quercetin, Fisetin, Magnesium Malate, Glycine, Taurine, L-Carnitine, Micro-dosed Lithium (cognitive health), Premium Carotenoids (Astaxanthin, Lutein, Zeaxanthin), and Ginger. It also includes essential vitamins and minerals such as B12, D3, K2, Vitamin C, Zinc, and Selenium, alongside a blend of red and purple superfruits including beetroot, blueberry, pomegranate, and acai.\n\nThat said, we completely understand if you're not comfortable consuming a supplement that arrived without full labelling — please do not feel any obligation to take it. Your safety and peace of mind always come first.\nYou've highlighted a valid concern around how samples are packaged and distributed, especially when included in orders containing children's products. We sincerely apologise for any confusion or concern this has caused, this\n[[AGENT]]\nHi [name],\n\nThank you for sending the photo over.\n\nFirstly, I'd like to apologise for any concern or confusion caused by the inclusion of the Youth & Earth V14 sample in your order.\n\nYou raise a completely understandable point. We agree that customers should have access to clear information about any supplement before deciding whether it is appropriate for them, particularly when factors such as allergies, medications, dietary preferences, and personal circumstances need to be considered.\n\nThe V14 sachet was included as a complimentary sample intended for adults and was not specifically selected based on the contents of your order. However, we appreciate your feedback regarding the packaging and the lack of readily available ingredient and dosage information accompanying the sample. We understand why this could be concerning, especially when received alongside products intended for children.\n\nFor reference, you can view the full product details, ingredients, nutritional information, and usage guidance on the product page here:\nhttps://healf.com/en-uk/products/youth-and-earth-v14-longevity-reds?variant=[phone]&selling_plan=[phone]\n\nWe've also shared your comments with the relevant team internally, as feedback like this is important in helping us review how samples are presented and communicated. Our intention is always to support informed choices and customer wellbeing, and we appreciate you taking the time to highlight an area where your experience fell short of expectations.\n[[CUSTOMER]]\nHi Jemaica,\nThank you for your response and for taking the time to investigate this further.\nI appreciate the clarification regarding the sample and the fact that you’ve passed my feedback on to the relevant team.\nMy concern was never about the V14 product itself, but rather the principle that customers should be able to easily identify what a supplement contains before deciding whether to consume it. Given the wide range of allergies, medical conditions, medications, dietary requirements, and personal preferences people may have, I think clear ingredient and dosage information should ideally accompany any unsolicited supplement sample.\nI was pleased to see that you understood the concern and took it seriously. Thank you also for the gift card gesture, which was very kind and appreciated.\nI hope the feedback proves useful as you review the sampling programme going forward.\nKind regards,\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for your thoughtful response.\n\nI completely understand your concerns, and I appreciate you taking the time to explain them so clearly. Your feedback around transparency and making ingredient and dosage information readily available has been shared with the relevant team.\n\nThank you as well for your understanding throughout this process. We're pleased the gesture was appreciated, and we're grateful for your feedback as it helps us continue improving the experience for our community.\n\nWith Healf,\n\nJemaica\nCustomer Wellbeing Executive\nHealf Experience: Meet Andrew Huberman, Dr. Rhonda Patrick, and more at HX26 on 20-21 June — a weekend dedicated to your wellbeing. Tickets available here.", "246543390": "[[CUSTOMER]]\nFurther to your email below, have you received stock and are about to dispatch?\n\nRegards\n\n[name]\n[phone]\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[LOLA]]\nHi [name],\n\nThanks for checking in. I’ve just reviewed your order [order] and the Ode Brew Grinder Gen 2 is still on pre-order — the latest ETA from our supplier is 10 March 2026. We haven’t received this stock yet, but we’ll dispatch your grinder as soon as it lands.\n\nIf you’d prefer not to wait, you’re welcome to choose one of these options instead:\n- Cancel the grinder for a refund of £206.25, or\n- Receive a Healf gift card for £240.00 as a goodwill alternative\n\nWe can also swap you to an in‐stock alternative — just say the word and I’ll share suitable options.\n\nLet me know what works best for you, or if you’re happy to keep your place in the queue for the 10 March ETA.\n\nWith Healf,\nLola\n[[CUSTOMER]]\nHello Lola, This is a mess and does not reflect well on Healf. An item ordered for Christmas has been pushed back till March and I have no confidence that it will be available then. Please read the following reply we got from the suppliers – it shows that Healf has been preselling stock knowing full well it is not available – disgraceful.\nKatie M (Fellow) Feb 10, 2026, 11:19 PST Hi there,\nThanks for reaching out, and I am so sorry you are having this experience. We have not had sufficient supply in the UK to send to Healf, so that may be what they are referencing. We have requested that they stop selling these on preorder, since we have never made any commitments to dates or volumes of shipments, and we do not want any customer to have this kind of poor experience.\nIn the meantime, we have stock at Amazon UK as well as from retailers like Harrod's, Selfridge's, Borough Kitchen, or Espresso Solutions on coffeemerch.co.uk. (http://coffeemerch.co.uk) I would therefore like an immediate refund of the full amount, and believe you should be offering me compensation for goodwill – in money or the very least in a Healf reward card I look forward to hearing that you have acted on this [name]\n[[AGENT]]\nHi [name],\n\nThank you for your message. We understand how disappointing this has been, especially with an order placed for Christmas that has since been moved back. We appreciate you sharing the supplier’s response with us.\n\nWe want to reassure you that we do not knowingly sell stock that is unavailable. We open pre-orders based on the timelines and information shared with us by our suppliers so customers can secure high-demand products. In this case, supply has not followed the expected schedule, and we recognise the frustration that has caused.\n\nYour full refund has now been processed. The funds will return to your original payment method within 2-3 working days.\n\nAs a gesture of goodwill, we would like to offer you 15% off a future order with us. You can use the code CW-RESET15-02 at checkout whenever you feel ready to shop with Healf again.\n\nWe are reviewing this product page and our supplier communication to ensure greater clarity going forward. Your feedback helps us improve.\n\nIf there is anything further you would like to raise, we are here to help.\n\nWith Healf,\n\nSheena\nCustomer Wellbeing\nhealf.com | healf.zone", "269421015": "[[CUSTOMER]]\nNew Contact Form Submission Name: [name] Email: [email] (mailto:[email]) Phone: Not Provided\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[LOLA]]\nHi [name],I'm sorry for the confusion here.I’ve checked order [order] and it’s already in progress with our warehouse, so I’m unable to cancel it at this stage.The delay is because this order contains SAMe, which is currently expected to ship by 25 June.Your newer order was processed separately, which is why that one is already out for delivery.Once [order] arrives, if you’d like to return it, just let us know and we can arrange that for you. If you decide to keep it instead, I’d be happy to offer 10% off your next order as an apology for the inconvenience.With Healf,Lola\n[[CUSTOMER]]\nHi Lola\n\nThanks for the very quick reply.\n\nI am still confused!\n\nI ordered SamE and paid postage for the item.\n\nYesterday I saw the original order was pending and that SamE was now available and at a reduced cost as well as discounted Thorne products and so I ordered again.\n\nBoth orders have SamE so I am not sure how, if it is not available until 25th June, you are already sending the item to me for an order placed more recently. Surely you should dispatch based on date order received? Otherwise that’s pretty poor customer service.\n\nAlso although I appreciate your offer of a discount I still ended up paying postage for the product plus at a higher price (as for some reason taxes were added and then you reduced the price) and so to actually recoup the increased spend, I would need to have a larger discount than 10% to even just cover the the difference.\n\nVery disappointed in all of this - I order a lot from you and spend a lot of money and expected better.\n\nregards\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for your patience, and I'm very sorry for the confusion and frustration this situation has caused.\n\nHaving looked into this further with our warehouse team, I can see what happened. The incoming batch of SAMe that was originally expected towards the end of June actually arrived ahead of schedule this morning. As soon as the stock was received, both of your orders containing the product were immediately picked, packed, and released for dispatch today (18 June).\n\nBecause we had sufficient stock in this delivery to fulfil all outstanding orders, the warehouse team processed all eligible orders as quickly as possible to avoid any further delays for customers waiting on the product. This is why both of your orders were dispatched at the same time, despite being placed on different dates.\n\nI completely appreciate why this appeared confusing from your perspective, particularly given the information you had previously received regarding the expected availability date. I also understand your concerns regarding the pricing difference and the shipping charge on the original order.\n\nWith that in mind, I would love to make this right for you by doing the following:\n- A refund of the £3.99 shipping fee from order [order].\n- A refund of £5.30 on order [order], which reflects the difference between the price paid for SAMe on order [order] and the lower price available on order [order].\n- In addition, as an apology for the confusion and disappointment caused, I would lik\n[[CUSTOMER]]\nHi Suri,\n\nThanks for the quick reply.\n\nThank you for your comments and the steps you’re taking to resolve the issue - it is very much appreciated. It’s wonderful as a customer to feel valued.\n\nI look forward to receiving refund details, the gift card and the orders in due course.\n\nThanks once again for all your help.\n\nBest regards\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for your reply and for your patience.\n\nI have now gone ahead and processed the refunds as agreed, and I have also created the £30 gift card for you. This should have been sent to your email address. The gift card code is CW-GG-v8m3g99h.\n\nOnce again, I am very sorry for the inconvenience and miscommunication you experienced. We appreciate you bringing this to our attention, and we will work to ensure this does not happen again in the future.\n\nIf there is anything else we can help with, please don't hesitate to let me know. I would be more than happy to assist.\n\nKind regards,\n\nWith Healf\nSuri\n\nSuri\nTeam Lead\nHealf Experience: Meet Andrew Huberman, Dr. Rhonda Patrick, and more at HX26 on 20-21 June — a weekend dedicated to your wellbeing. Tickets available here.", "269790697": "[[CUSTOMER]]\nNew Contact Form Submission Name: [name] Email: [email] (mailto:[email]) Phone: Not Provided\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[LOLA]]\nHi [name],I'm sorry about this. I’ve checked your order [order] and it shows you ordered Sleep Teabags, which was delivered today.It also looks like a free Mixed Sample & Welcome Handbook was included with the parcel. If that handbook is the item you mean, that was just an extra sample and your Sleep Teabags should also have been in the delivery.If the Sleep Teabags were missing and you only received the sample booklet, please send me a quick photo of everything that arrived in the parcel, including the packing slip if you still have it, and I’ll help with the next step.With Healf,Lola\n[[CUSTOMER]]\nI ordered mission sleep which had camomile linden blossom and rose hip\nYou sent me one that contains rooms is powder turmeric and lavender\nRegards [name]\n\nSent via BT Email App\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[CUSTOMER]]\nI have sent you photo of what I got under separate cover\n\nSent via BT Email App\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[AGENT]]\nHi [name],\n\nThank you so much for getting in touch and for bringing this to our attention, I've relayed this back to our website team to review.\n\nOccasionally there may small differences in imagery or product information whilst we make updates to reflect the latest packaging and details provided by our brand partners. I hope to assure you in that all products we stock are genuine and sourced directly from the brands themselves.\n\nWe are now checking with our brand partners and warehouse team what happened. Once we have the latest information on this, we will let you know and also the course of action we are going to take.\n\nThank you so much for your patience with this and for having placed your trust in us. We're looking forward to resolving this for you.\n\nWith Healf,\n\nMon\nCustomer Wellbeing Executive\nHealf Experience: Meet Andrew Huberman, Dr. Rhonda Patrick, and more at HX26 on 20-21 June — a weekend dedicated to your wellbeing. Tickets available here.\n[[AGENT]]\nHi [name],\n\nI hope you’re doing well.\n\nI’m just getting in touch to follow up on our last email. Thank you so much for your patience while we looked into this.\n\nAgain, I'm so sorry to hear this and we'll investigate this at our warehouse to prevent future occurrences.\n\nI'm pleased to let you know that we've now identified the issue and have arranged for the correct item to be sent to you.\n\nI have sent your replacement to be processed in the warehouse now and you'll receive tracking details by email as soon as this is available so you can follow the journey of your parcel.\n\nWe're sending this to you with expedited shipping to ensure you receive it as soon as possible. You may have received an email mentioning a £5.99 invoice for the delivery however please disregard this, there’s definitely no payment required as we’re covering it!\n\nAs an apology, we would like to offer the option to keep the incorrect item. We hope you can enjoy this, or if you prefer, please feel free to gift it to someone who might!\n\nLooking forward to hearing from you and please let us know if you have any questions at all.\n\nWith Healf,\n\nGretchen\nCustomer Wellbeing Executive\nHealf Experience: Meet Andrew Huberman, Dr. Rhonda Patrick, and more at HX26 on 20-21 June — a weekend dedicated to your wellbeing. Tickets available here.", "271894822": "[[CUSTOMER]]\nHi Lola,\nI'm writing to ask for an update on my order.\nI placed and paid for the pre-order on 2 February, with an expected shipping date of 3 March. On 3 March I was informed that the shipment had been been delayed until 15 April. That date was then moved to 17 June, and it is now 2 July and I still haven't received the item or any further updates.\nI appreciate that you've offered replacement products, but I specifically pre-ordered this item because it's the one I wanted, so I'm not interested in an alternative.\nThe order was also placed as part of a promotion (£28.99 instead of £30.99, with a buy one, get two offer). If I were to cancel now and buy the same product elsewhere, it would cost me at least £39.62. I don't feel it's fair that I should have to pay a higher price because of delays outside of my control.\nCould you please let me know:\nWhen you realistically expect the original product to be available.\nWhether my order is still active and reserved.\nIf there have been any further delays that I haven't been informed about.\nIf the item is no longer expected to become available, what solution you can offer that doesn't leave me financially worse off due to these delays.\nI'd appreciate an honest update so I can decide how to proceed.\nThank you, and I look forward to hearing from you.\nKind regards,\n[name]\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[AGENT]]\nHi [name],\n\nThank you for getting in touch again.\n\nI’m so sorry to hear that you’re still waiting for the MorEPA - Platinum from your previous order. I understand how frustrating this is and it does not reflect the service we strive for at Healf.\n\nI've had another look into the issue and it seems this particular product is being discontinued. As a result, we will not be replenishing stock of it. I'm so sorry this was not communicated sooner!\n\nI can issue a refund of £28.99, or I’d like to offer you a £45 gift card. The gift card can be used within the next year and applied multiple times until the credit is used up.\n\nPlease let me know which of these options you'd prefer and I’ll action either decision promptly.\n\nI’m so sorry again for any frustration we’ve caused. We really appreciate your patience and if there is anything else we can do for you, please don’t hesitate to get in touch.\n\nWith Healf,\n\nDovic\nCustomer Wellbeing Executive\n[[CUSTOMER]]\nHi Dovic,\nThank you for your reply and for looking into this.\nI appreciate the explanation, although I'm naturally disappointed to learn that the product has been discontinued, especially after waiting for over four months and receiving multiple revised delivery dates.\nI'll accept the £45 gift card, as that seems like the fairest resolution. However, I do feel this situation could have been handled much better. Had I been informed earlier that the product was being discontinued, I could have made an informed decision rather than continuing to wait.\nPlease go ahead and issue the gift card, and I'd appreciate it if you could confirm once it has been processed.\nThank you for your help.\nKind regards,\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for your understanding, and again, I'm really sorry for the experience you've had with this order.\n\nI can completely appreciate your disappointment after waiting for so long and receiving several revised delivery dates before finding out the product had been discontinued. Your feedback is completely fair, and we'll use it to help improve how we communicate situations like this in the future.\n\nI can confirm that I've now issued the £45 Healf gift card, and it has been sent to your email address. If you don't see it in your inbox, please do check your spam or junk folder as it can occasionally end up there.\n\nThank you again for your patience throughout this process, and I hope the gift card helps you find something you'll enjoy.\n\nWith Healf,\n\nDovic\nCustomer Wellbeing Executive", "270647340": "[[CUSTOMER]]\nNew Contact Form Submission Name: [name] Email: [email] (mailto:[email]) Phone: [phone]\n[[LOLA]]\nThanks for reaching out. We’ve received your message, and our team will be in touch within 24 hours.\n\nIn the meantime, a look through our FAQs: https://healf.com/pages/faqs might provide some immediate assistance.\n\nThanks again — we look forward to speaking soon.\n\nWith Healf,\n[[AGENT]]\nHi [name],\n\nThank you for getting in touch. I'm so sorry to hear this - we'll make sure to put this right as soon as possible.\n\nWould it be ok to return the faulty product back to us please so we can send it onto the brand for investigation?\n\nHere are a few notes on the process:\n- To begin the returns process, please follow this link, ensuring to include the hashtag (#H-) before your order number (e.g. [order]). Please also use the same email address used when placing the order.\n- Please upload a photo/video of the issue so we can share this with our suppliers. We’ll aim to review your return submission within 24 hours, and your QR code will follow by email.\n- We offer the choice of a refund, store credit, or a replacement/exchange (dispatched within 7 days of us receiving and processing the return).\n- Your return will be processed once checked by our warehouse team. Refunds are issued to your original payment method and may take up to 14 working days to appear.\n\nThank you so much for your patience throughout this process and please let us know if there is anything else we can do for you.\n\nWith Healf,\n\nGrace\ncustomer wellbeing executive\n[[CUSTOMER]]\nHi,\nCan I send just a remote control? This parcel is very heavy, seems like all works okay, I switched it on, didn’t try it yet.\n[[AGENT]]\nHi [name],\n\nI hope you're doing well, and thank you for getting in touch. I'm more than happy to look into this for you.\n\nI'm pleased to hear that the unit powers on and everything else seems to be working as expected.\n\nAs for returning just the remote control, I'd like to check this with the relevant team first to see whether that's an option. If it isn't, I'll also explore whether there's an alternative solution that would save you from having to send the entire unit back, especially as I appreciate it's quite heavy.\n\nI'll come back to you as soon as I have an update, and we'll do our best to find the most practical solution for you.\n\nThank you for your patience, and I'll be in touch soon.\n\nWith Healf,\n\nSuzy\n[[CUSTOMER]]\nHello,\nAfter inspecting the item more closely, I found an additional problem that I hadn’t noticed initially.\nThe item appears to have been previously used or refurbished. I found three scratches on the casing, and it is also missing a part on one side where the resistance bands attach. Because of the missing attachment point, the item is not complete and cannot be used as intended.\nI’ve attached photos showing the scratches and the missing part for reference.\nCould you please advise how you would like to resolve this? I would appreciate a replacement with a brand-new, complete unit, or a full refund if a replacement is not available.\nThank you.\n[[AGENT]]\nHi [name],\n\nThank you for getting back to us, and thank you for taking the time to inspect the item further and send through the photos.\n\nI'm really sorry to hear that you've now found additional issues with the product. This certainly isn't the experience we want for you, and I completely understand your disappointment.\n\nWe really appreciate you bringing this to our attention. We'll make sure this is reviewed with our team, including the scratches you've identified and the missing attachment point, so we can investigate it thoroughly.\n\nWe'll get back to you as soon as possible with the next steps.\n\nThank you for your patience and understanding.\n\nWith Healf,\n\nJessica\nCustomer wellbeing executive\n[[AGENT]]\nHi [name],\n\nThank you for letting us know, and for taking the time to inspect the item further and send through the photos.\n\nI'm very sorry to hear that you've received an item with scratches and a missing attachment point. That's certainly not the experience we want you to have.\n\nWould it be ok to return the faulty product back to us please so we can send it onto the brand for investigation?\n\nHere are a few notes on the process:\n- To begin the returns process, please follow this link, ensuring to include the hashtag (#H-) before your order number (e.g. [order]). Please also use the same email address used when placing the order.\n- Please upload a photo/video of the issue so we can share this with our suppliers. We’ll aim to review your return submission within 24 hours, and your QR code will follow by email.\n- We offer the choice of a refund, store credit, or a replacement/exchange (dispatched within 7 days of us receiving and processing the return).\n- Your return will be processed once checked by our warehouse team. Refunds are issued to your original payment method and may take up to 14 working days to appear.\n\nThank you so much for your patience throughout this process and please let us know if there is anything else we can do for you!\n\nIf you have any questions about the return process or need any assistance, please don't hesitate to let us know, we're here to help!\n\nWith Healf,\n\nSuzy\n[[CUSTOMER]]\nHello,\nRoyal Mail didn’t accept my parcel because it exceeds their weight limit. They only accept parcels up to 20 kg, but this parcel weighs over 22 kg.\nCould you please advise how we should proceed?\nThank you.\n[[AGENT]]\nHi [name],\n\nThank you for letting me know, and I'm sorry for the inconvenience.\n\nI've now coordinated with our team to arrange a more suitable courier to assist with your return, as the parcel exceeds Royal Mail's weight limit.\n\nThank you so much for your patience and for taking the time to try returning the parcel. We really appreciate your efforts, and we'll do everything we can to make the rest of the process as straightforward as possible.\n\nI'll keep you posted as soon as I have an update.\n\nWith Healf,\n\nJaya\n[[AGENT]]\nHi [name],\n\nI hope you're doing well.\n\nI just wanted to follow up on our previous email and keep you updated.\n\nAt the moment, we're still waiting to hear back from our internal team regarding your enquiry. As it's the weekend, response times are a little slower than usual, but please be assured that we'll get back to you as soon as we receive an update.\n\nThank you so much for your continued patience and understanding. We really appreciate it, and we'll be in touch as soon as we have more information.\n\nIf you have any questions in the meantime, please don't hesitate to get in touch.\n\nWith Healf,\n\nMon\nCustomer Wellbeing Executive\n[[AGENT]]\nHi [name],\n\nI hope you're doing well.\n\nI'm so sorry for the delay, and thank you so much for your patience.\n\nI'm ready to book your collection for tomorrow. Could you please let me know whether you would prefer a morning or afternoon collection?\n\nThe available collection windows are:\n\nMorning: 9:00 am - 1:00 pm\nAfternoon: 1:00 pm. - 6:00 pm\n\nOnce you've let me know your preferred time, I'll get everything booked for you straight away. I attached the return label as well.\n\nThank you again, and I look forward to hearing from you.\n\nWith Healf,\n\nJaya\n[[CUSTOMER]]\nHi,\nKind regards,\nThank you for your email.\nMorning is fine for me. Thank you for arranging the collection\n[name]\n[[AGENT]]\nHi [name],\n\nThank you for your message. I'm pleased to say I have booked the collection for tomorrow morning.\n\nPlease ensure the label is secured to the outside of the parcel, ideally over the top of any old labels.\n\nThank you so much for your patience and please let me know if there is anything else I can assist you with in the meantime.\n\nWith Healf,\n\nJaya"};
let coActive = null;
const coEsc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');

function renderCoNav() {
  const el = document.getElementById('co-nav'); if (!el) return;
  el.innerHTML = CO_INBOXES.map(ib => {
    const n = CO_TICKETS.filter(t => t.inbox === ib.id).length;
    return `<div class="nav-item${coActive===ib.id?' active':''}" onclick="openCoInbox('${ib.id}')">
      <div class="nav-item-left"><span class="nav-item-icon">${ICONS.folder}</span><span class="nav-item-label">${ib.label}</span></div>
      <span class="nav-count">${n}</span></div>`;
  }).join('');
}
function showCoContainer() {
  document.getElementById('ticket-table-view').style.display = 'none';
  document.getElementById('ticket-detail').style.display = 'none';
  document.getElementById('co-view').style.display = 'block';
  document.querySelectorAll('.leftnav-top .nav-item, #category-nav .nav-item').forEach(el => el.classList.remove('active'));
}
function openCoInbox(id) {
  coActive = id; renderCoNav(); showCoContainer();
  const ib = CO_INBOXES.find(i => i.id === id);
  const rows = CO_TICKETS.filter(t => t.inbox === id);
  document.getElementById('co-view').innerHTML =
    `<div class="co-head"><div class="co-head-title">${ib.label}</div><div class="co-head-sub">${ib.sub}</div></div>` +
    rows.map(t => `<div class="co-row" onclick="openCoTicket(${t.n})"><div class="co-num">${t.n}</div><div><div class="co-row-title">${coEsc(t.title)}</div><div class="co-row-sub">${coEsc(t.summary)}</div><div><span class="co-tag ${t.inbox==='positive'?'pos':''}">${coEsc(t.cat)}</span></div></div></div>`).join('');
}
function coThreadHtml(raw) {
  if (!raw) return '<div style="background:#f9fafb;border:1px dashed #e5e7eb;border-radius:10px;padding:20px;text-align:center;color:#9ca3af;font-size:12.5px;margin-bottom:24px">This one lives on Slack — open the Slack thread link above to read it.</div>';
  const segs = raw.split(/\[\[(LOLA|AGENT|CUSTOMER)\]\]\s*/);
  let h = '';
  for (let i = 1; i < segs.length; i += 2) {
    const type = segs[i], body = (segs[i+1]||'').trim(); if (!body) continue;
    if (type === 'CUSTOMER') h += `<div class="msg-wrap in"><div class="msg-ava customer">C</div><div class="msg-content"><div class="msg-meta"><span class="msg-sender">Customer</span></div><div class="msg-card">${coEsc(body)}</div></div></div>`;
    else if (type === 'LOLA') h += `<div class="msg-wrap out"><div class="msg-ava lola">L</div><div class="msg-content"><div class="msg-meta"><span class="msg-sender">Lola</span><span class="auto-chip">automated</span></div><div class="msg-card lola-card">${coEsc(body)}</div></div></div>`;
    else h += `<div class="msg-wrap out"><div class="msg-ava agent">H</div><div class="msg-content"><div class="msg-meta"><span class="msg-sender">Healf</span></div><div class="msg-card agent-card">${coEsc(body)}</div></div></div>`;
  }
  return `<div style="display:flex;flex-direction:column;gap:13px;margin-bottom:24px">${h}</div>`;
}
function coMacroOptions() { return '<option value="">Insert a macro…</option>' + (macros||[]).map((m,i) => `<option value="${i}">${coEsc(m.name)}</option>`).join(''); }
function coInsertMacro(sel) { const i = sel.value; if (i === '') return; const ta = document.getElementById('co-reply'); ta.value = (ta.value ? ta.value + '\n\n' : '') + (macros[i].body || ''); sel.value = ''; }
function openCoTicket(n) {
  const t = CO_TICKETS.find(x => x.n === n); showCoContainer();
  const ib = CO_INBOXES.find(i => i.id === t.inbox);
  const prodHead = t.prod
    ? `<div class="co-head-prod"><span class="lbl">Product</span>${t.prod.brand?`<span class="co-head-brand">${coEsc(t.prod.brand)}</span>`:''}${t.prod.link?`<a href="${t.prod.link}" target="_blank" rel="noopener">${coEsc(t.prod.name)} ↗</a>`:`<span class="co-head-pname">${coEsc(t.prod.name)}</span>`}</div>`
    : '';
  const qs = CO_Q.map((q,idx) => `<div class="co-side-q"><div class="qn">Q${idx+1}</div><div class="qt">${q}</div><textarea class="co-note" placeholder="Your notes…"></textarea></div>`).join('');
  document.getElementById('co-view').innerHTML = `
    <div class="co-head">
      <button class="co-back" onclick="openCoInbox('${t.inbox}')">‹ Back to ${ib.label}</button>
      <div class="co-head-title">${coEsc(t.title)}</div>
      <div style="margin-top:8px"><span class="co-tag">${coEsc(t.cat)}</span></div>
      <div class="co-links">
        ${t.slack?`<a class="co-linkbtn" href="${t.slack}" target="_blank" rel="noopener">Slack thread ↗</a>`:''}
        ${t.gg?`<a class="co-linkbtn" href="${CO_GG}${t.gg}" target="_blank" rel="noopener">Gorgias ticket ↗</a>`:''}
      </div>
      ${prodHead}
    </div>
    <div class="co-detail-body">
      <div class="co-thread-col">
        <div class="co-summary"><div class="lbl">Summary</div>${coEsc(t.summary)}</div>
        <div class="co-thread-lbl">The full thread</div>
        ${coThreadHtml(CO_THREADS[t.gg] || '')}
        <div class="co-composer">
          <div class="co-composer-bar"><select onchange="coInsertMacro(this)">${coMacroOptions()}</select></div>
          <textarea id="co-reply" placeholder="Try it yourself — draft the reply you'd have sent…"></textarea>
          <div class="co-actions-label">Actions — the steps you'd take (Shopify / Swap / Recharge etc.)</div>
          <textarea class="co-actions" placeholder="e.g. Cancel the order, MO the alternative, flag the PDP, log the GXO error…"></textarea>
        </div>
      </div>
      <div class="co-side">
        <div class="co-side-title">Reflect &amp; discuss</div>
        ${qs}
      </div>
    </div>`;
}

init();
renderCoNav();
</script>
</body>
</html>
