<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healf Support — Practice</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #111; }

/* ── TOP NAV ── */
.topnav { background: #1a1a2e; height: 44px; display: flex; align-items: center; padding: 0 14px; gap: 10px; flex-shrink: 0; position: relative; }
.topnav-logo { display: flex; align-items: center; gap: 7px; }
.topnav-logomark { width: 26px; height: 26px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; color: #111; letter-spacing: -0.5px; }
.topnav-name { color: #fff; font-weight: 700; font-size: 14px; }
.topnav-inbox { display: flex; align-items: center; gap: 4px; color: #fff; font-weight: 600; font-size: 13px; margin-left: 6px; cursor: pointer; }
.topnav-caret { color: #9ca3af; font-size: 9px; }
.topnav-actions { display: flex; gap: 6px; margin-left: 8px; }
.topnav-btn { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e5e7eb; font-size: 12px; padding: 4px 11px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.topnav-btn:hover { background: rgba(255,255,255,0.14); }
.topnav-btn kbd { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 3px; font-size: 9px; padding: 0 3px; color: #aaa; }
.topnav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.topnav-icon { color: #9ca3af; font-size: 15px; cursor: pointer; }
.topnav-icon:hover { color: #fff; }
.topnav-avatar { width: 27px; height: 27px; border-radius: 50%; background: #7c3aed; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10px; cursor: pointer; }

/* ── APP ── */
.app { display: flex; flex: 1; overflow: hidden; }

/* ── LEFT NAV ── */
.leftnav { width: 220px; min-width: 220px; background: #fff; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.leftnav-top { padding: 10px 10px 4px; }
.nav-section-label { font-size: 11px; font-weight: 600; color: #6b7280; padding: 10px 10px 4px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.nav-section-label:hover { color: #374151; }
.nav-section-caret { font-size: 9px; color: #9ca3af; }
.nav-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-radius: 6px; cursor: pointer; color: #374151; font-size: 12.5px; margin-bottom: 1px; }
.nav-item:hover { background: #f3f4f6; }
.nav-item.active { background: #ede9fe; color: #5b21b6; font-weight: 500; }
.nav-item-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.nav-item-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-item-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-count { font-size: 10px; font-weight: 600; background: #f3f4f6; color: #6b7280; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; }
.nav-item.active .nav-count { background: #ddd6fe; color: #5b21b6; }
.nav-count.red { background: #fee2e2; color: #dc2626; }
.nav-count.amber { background: #fef3c7; color: #d97706; }
.nav-divider { height: 1px; background: #f3f4f6; margin: 6px 0; }
.nav-sub { padding-left: 18px; }
.nav-sub .nav-item { font-size: 12px; color: #6b7280; }
.nav-sub .nav-item:hover { color: #374151; }
.nav-locked { opacity: 0.45; cursor: default; }
.nav-locked:hover { background: none !important; }
.nav-active-badge { font-size: 9px; background: #7c3aed; color: #fff; padding: 1px 5px; border-radius: 4px; margin-left: 3px; flex-shrink: 0; }
.leftnav-footer { position: relative; margin-top: auto; padding: 10px 12px; border-top: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; }
.trainee-info { display: flex; align-items: center; gap: 8px; }
.trainee-avatar { width: 28px; height: 28px; border-radius: 50%; background: #7c3aed; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; flex-shrink: 0; }
.trainee-name-sm { font-size: 12px; font-weight: 600; color: #111; }
.trainee-email-sm { font-size: 10px; color: #9ca3af; }
.footer-icons { display: flex; gap: 8px; color: #9ca3af; font-size: 15px; }
.footer-icons span { cursor: pointer; }
.footer-icons span:hover { color: #374151; }

/* ── MAIN ── */
.main-area { flex: 1; display: flex; overflow: hidden; flex-direction: column; }

/* ── TICKET TABLE VIEW ── */
.ticket-table-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.ttv-header { padding: 16px 24px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; background: #fff; }
.ttv-title { font-size: 16px; font-weight: 700; color: #111; display: flex; align-items: center; gap: 8px; }
.ttv-count { font-size: 12px; color: #6b7280; font-weight: 400; }
.ttv-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.ttv-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; font-size: 12px; color: #374151; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; }
.ttv-btn:hover { background: #f9fafb; }
.ticket-table-wrap { flex: 1; overflow-y: auto; }
table.ticket-table { width: 100%; border-collapse: collapse; }
table.ticket-table thead th { padding: 9px 16px; text-align: left; font-size: 11px; font-weight: 600; color: #9ca3af; border-bottom: 1px solid #e5e7eb; background: #fff; position: sticky; top: 0; white-space: nowrap; cursor: pointer; user-select: none; }
table.ticket-table thead th:hover { color: #374151; }
table.ticket-table thead th:first-child { width: 36px; padding-right: 0; }
table.ticket-table tbody tr { cursor: pointer; border-bottom: 1px solid #f3f4f6; transition: background 0.08s; }
table.ticket-table tbody tr:hover { background: #f9fafb; }
table.ticket-table tbody tr.active-row { background: #f5f3ff; }
table.ticket-table tbody td { padding: 11px 16px; font-size: 12.5px; color: #374151; vertical-align: middle; }
table.ticket-table tbody td:first-child { width: 36px; padding-right: 0; }
.tt-checkbox { width: 14px; height: 14px; accent-color: #7c3aed; cursor: pointer; }
.tt-subject { font-weight: 600; color: #111; margin-bottom: 2px; }
.tt-preview { font-size: 11px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }
.tt-assignee { font-size: 12px; color: #6b7280; }
.tt-time { font-size: 12px; color: #374151; white-space: nowrap; }
.tt-time.bold { font-weight: 600; color: #111; }
.tt-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.dot-open { background: #7c3aed; }
.dot-score-3 { background: #22c55e; }
.dot-score-2 { background: #f59e0b; }
.dot-score-1 { background: #ef4444; }

/* ── TICKET DETAIL (replaces table when ticket open) ── */
.ticket-detail { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.td-topbar { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 20px; height: 46px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.td-back { color: #9ca3af; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; border: none; background: none; font-family: inherit; padding: 4px 8px; border-radius: 5px; }
.td-back:hover { background: #f3f4f6; color: #374151; }
.td-breadcrumb-sep { color: #d1d5db; }
.td-subject { font-weight: 700; font-size: 13px; color: #111; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.td-status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; flex-shrink: 0; }
.badge-open { background: #ede9fe; color: #5b21b6; border: 1px solid #ddd6fe; }
.badge-submitted { background: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; }
.badge-score-3 { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
.badge-score-2 { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
.badge-score-1 { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
.td-btn { padding: 4px 11px; border-radius: 6px; border: 1px solid #e5e7eb; background: #fff; font-size: 12px; color: #374151; cursor: pointer; font-family: inherit; }
.td-btn:hover { background: #f9fafb; }

/* MESSAGES */
.td-body { display: flex; flex: 1; overflow: hidden; }
.messages-area { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; background: #f9fafb; }
.msg-wrap { display: flex; gap: 10px; }
.msg-ava { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; }
.msg-ava.customer { background: #e5e7eb; color: #374151; }
.msg-ava.agent { background: #7c3aed; color: #fff; }
.msg-content { max-width: 600px; flex: 1; }
.msg-meta { font-size: 11px; color: #9ca3af; margin-bottom: 4px; display: flex; gap: 8px; }
.msg-sender { font-weight: 600; color: #374151; }
.msg-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 16px; font-size: 13px; line-height: 1.6; color: #374151; }
.msg-card.agent-card { background: #f5f3ff; border-color: #c4b5fd; }

/* REPLY BOX */
.reply-box { border-top: 1px solid #e5e7eb; background: #fff; flex-shrink: 0; }
.reply-to-row { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
.reply-channel-btn { display: flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 5px; border: 1px solid #e5e7eb; background: #fff; font-size: 12px; color: #374151; cursor: pointer; font-family: inherit; }
.reply-to-label { color: #9ca3af; }
.reply-to-val { color: #374151; font-weight: 500; }
.reply-textarea { width: 100%; border: none; outline: none; padding: 12px 16px; font-size: 13px; font-family: inherit; resize: none; min-height: 100px; color: #374151; background: #fff; line-height: 1.55; }
.reply-textarea::placeholder { color: #9ca3af; }
.actions-note-wrap { border-top: 1px dashed #e5e7eb; background: #fbfaff; padding: 8px 16px 4px; }
.actions-note-label { font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.actions-textarea { width: 100%; border: none; outline: none; padding: 4px 0 8px; font-size: 12.5px; font-family: inherit; resize: none; min-height: 60px; color: #374151; background: transparent; line-height: 1.5; }
.actions-textarea::placeholder { color: #b6bac2; }
.cs-items { margin-top: 6px; }
.li { padding: 7px 0; border-bottom: 1px solid #f3f4f6; }
.li:last-child { border-bottom: none; padding-bottom: 0; }
.li-name { font-size: 12px; color: #374151; font-weight: 500; }
.li-name a { color: #7c3aed; text-decoration: none; }
.li-name a:hover { text-decoration: underline; }
.li-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
.tt-group td { background: #f9fafb; padding: 8px 16px; border-bottom: 1px solid #eceef1; }
.tt-group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; }
.tt-group-count { display: inline-block; margin-left: 8px; font-size: 10px; font-weight: 600; background: #e5e7eb; color: #6b7280; padding: 1px 7px; border-radius: 8px; }
.tt-empty { text-align: center; padding: 20px; color: #9ca3af; font-size: 12px; }
.reply-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-top: 1px solid #f3f4f6; }
.reply-hint { font-size: 11px; color: #9ca3af; }
.reply-actions { display: flex; gap: 8px; }
.macro-bar { position: relative; padding: 8px 16px 0; }
.macro-trigger { display: inline-flex; align-items: center; gap: 5px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #374151; cursor: pointer; font-family: inherit; }
.macro-trigger:hover { background: #ede9fe; color: #5b21b6; border-color: #ddd6fe; }
.macro-picker { display: none; position: absolute; bottom: calc(100% + 6px); left: 16px; width: 440px; max-width: calc(100% - 32px); background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.16); z-index: 60; overflow: hidden; }
.macro-picker.open { display: block; }
.macro-search { width: 100%; border: none; border-bottom: 1px solid #f3f4f6; padding: 10px 14px; font-size: 13px; font-family: inherit; outline: none; color: #111; }
.macro-list { max-height: 300px; overflow-y: auto; }
.macro-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid #f9fafb; }
.macro-item:last-child { border-bottom: none; }
.macro-item:hover { background: #ede9fe; }
.macro-item-cat { font-size: 9px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.4px; }
.macro-item-name { font-size: 12.5px; font-weight: 600; color: #374151; }
.macro-item-preview { font-size: 11px; color: #9ca3af; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.macro-empty { padding: 18px; text-align: center; color: #9ca3af; font-size: 12px; }
.submit-btn { padding: 7px 18px; background: #111827; color: #fff; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.submit-btn:hover { background: #374151; }
.submit-btn:disabled { background: #9ca3af; cursor: not-allowed; }
.send-close-btn { padding: 7px 14px; background: #fff; color: #374151; border: 1px solid #e5e7eb; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.send-close-btn:hover { background: #f9fafb; }

/* SUBMITTED BANNER */
.submitted-banner { background: #f0fdf4; border-top: 1px solid #bbf7d0; padding: 18px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.submitted-title { font-weight: 700; font-size: 14px; color: #166534; }
.submitted-sub { font-size: 12px; color: #4b7a55; margin-top: 2px; }
.score-display { margin-left: auto; text-align: center; background: #fff; border: 1px solid #bbf7d0; border-radius: 8px; padding: 8px 16px; }
.score-val { font-size: 22px; font-weight: 800; color: #7c3aed; }
.score-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; }
.feedback-box { background: #f5f3ff; border: 1px solid #c4b5fd; border-radius: 8px; padding: 12px 16px; margin: 0 20px 14px; font-size: 13px; color: #374151; line-height: 1.55; }

/* CUSTOMER SIDEBAR */
.customer-sidebar { width: 256px; min-width: 240px; background: #fff; border-left: 1px solid #e5e7eb; overflow-y: auto; flex-shrink: 0; }
.cs-section { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; }
.cs-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #9ca3af; margin-bottom: 10px; }
.cs-name { font-size: 14px; font-weight: 700; color: #111; }
.cs-email { font-size: 12px; color: #7c3aed; margin-top: 2px; }
.cs-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 5px 0; border-bottom: 1px solid #f9fafb; }
.cs-row:last-child { border-bottom: none; }
.cs-label { font-size: 12px; color: #9ca3af; }
.cs-value { font-size: 12px; color: #374151; font-weight: 500; text-align: right; }
.order-card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 12px; }
.order-num { font-size: 11px; font-weight: 700; color: #7c3aed; }
.order-status-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; margin-top: 5px; }
.os-fulfilled { background: #dcfce7; color: #166534; }
.os-partial { background: #dbeafe; color: #1d4ed8; }
.os-unfulfilled { background: #fef9c3; color: #854d0e; }
.loyalty-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; }
.loyalty-bronze { background: #fef3c7; color: #92400e; }
.loyalty-silver { background: #f3f4f6; color: #374151; }
.loyalty-gold { background: #fef9c3; color: #713f12; }
.loyalty-vip { background: #ede9fe; color: #5b21b6; }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
.loading-spinner { width: 30px; height: 30px; border: 3px solid #e5e7eb; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #9ca3af; font-size: 13px; }
.tv-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #9ca3af; background: #f9fafb; }
.tv-empty-icon { font-size: 40px; opacity: 0.2; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 99px; }

/* AGENT NOTES + tidy classes (so they theme correctly) */
.cs-addtag { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px dashed #d1d5db; border-radius: 14px; font-size: 11px; color: #6b7280; cursor: pointer; background: none; font-family: inherit; margin-bottom: 8px; }
.cs-add { font-size: 11px; color: #7c3aed; cursor: pointer; }
.cs-more { font-size: 11px; color: #7c3aed; cursor: pointer; margin-top: 6px; }
.cs-notes { width: 100%; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; font-size: 12px; font-family: inherit; resize: none; outline: none; min-height: 60px; color: #374151; background: #fff; }

/* PROFILE MENU */
.profile-menu { position: absolute; bottom: 56px; left: 8px; right: 8px; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.22); z-index: 200; overflow: hidden; display: none; }
.profile-menu.open { display: block; }
.pm-head { display: flex; align-items: center; gap: 10px; padding: 14px; border-bottom: 1px solid #f3f4f6; }
.pm-avatar { width: 34px; height: 34px; border-radius: 50%; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
.pm-name { font-size: 13px; font-weight: 700; color: #111; }
.pm-sub { font-size: 11px; color: #9ca3af; }
.pm-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; font-size: 13px; color: #374151; cursor: pointer; }
.pm-row:hover { background: #f9fafb; }
.pm-divider { height: 1px; background: #f3f4f6; }
.pm-toggle { width: 34px; height: 20px; border-radius: 99px; background: #d1d5db; position: relative; transition: background 0.15s; flex-shrink: 0; }
.pm-toggle.on { background: #7c3aed; }
.pm-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #fff; transition: left 0.15s; }
.pm-toggle.on::after { left: 16px; }
.pm-signout { color: #dc2626; }

/* ─────────────  DARK THEME  ───────────── */
html[data-theme="dark"] body { background: #17171a; color: #e6e6e9; }
html[data-theme="dark"] .leftnav { background: #1d1d21; border-right-color: #2c2c31; }
html[data-theme="dark"] .nav-item { color: #c7c7cd; }
html[data-theme="dark"] .nav-item:hover { background: #26262b; }
html[data-theme="dark"] .nav-item.active { background: #2e2a4d; color: #c4b5fd; }
html[data-theme="dark"] .nav-section-label { color: #8a8a92; }
html[data-theme="dark"] .nav-count { background: #2c2c31; color: #a1a1aa; }
html[data-theme="dark"] .nav-item.active .nav-count { background: #4c4470; color: #ddd6fe; }
html[data-theme="dark"] .nav-divider { background: #2c2c31; }
html[data-theme="dark"] .leftnav-footer { border-top-color: #2c2c31; }
html[data-theme="dark"] .trainee-name-sm { color: #f4f4f5; }
html[data-theme="dark"] .ttv-header, html[data-theme="dark"] .td-topbar { background: #1d1d21; border-bottom-color: #2c2c31; }
html[data-theme="dark"] .ttv-title, html[data-theme="dark"] .td-subject { color: #f4f4f5; }
html[data-theme="dark"] .ttv-count, html[data-theme="dark"] .ttv-btn, html[data-theme="dark"] .td-btn, html[data-theme="dark"] .reply-channel-btn { color: #c7c7cd; }
html[data-theme="dark"] .ttv-btn, html[data-theme="dark"] .td-btn, html[data-theme="dark"] .reply-channel-btn { background: #232327; border-color: #2c2c31; }
html[data-theme="dark"] .ttv-btn:hover, html[data-theme="dark"] .td-btn:hover { background: #2a2a30; }

  37: "Oura Ring 4 – Silver (x1) — £349.00 [pre-order]\nFree gifts (x2) — £0.00",
  38: "NAC (N-AcetylCysteine) 600mg (x1) — £29.00 [unfulfilled]\nMega EPA Forte (x1) — £29.00 [Fulfilment in Progress]"
};
function ticketProducts(t) { return (t && (t.order_items || PRODUCTS_BY_ID[t.id])) || ''; }
function renderProducts(str) {
  if (!str) return '';
  return str.split('\n').filter(l => l.trim()).map(line => {
    const m = line.match(/^\[([^\]]+)\]\(([^)]+)\)\s*(.*)$/);
    let name, url = '', rest = '';
    if (m) { name = m[1]; url = m[2]; rest = m[3]; } else { name = line; }
    let qty = '', price = '', status = '';
    const qm = rest.match(/\(x?(\d+)\)/i); if (qm) qty = '×' + qm[1];
    const pm = rest.match(/£[\d.,]+/); if (pm) price = pm[0];
    const meta = [qty, price].filter(Boolean).join(' · ');  // no status text — matches how Gorgias shows order lines
    const title = url ? `<a href="${url}" target="_blank" rel="noopener">${name}</a>` : name;
    return `<div class="li"><div class="li-name">${title}</div>${meta ? `<div class="li-meta">${meta}</div>` : ''}</div>`;
  }).join('');
}

async function init() {
  const stored = sessionStorage.getItem('trainee');
  if (!stored) { window.location.href = 'index.html'; return; }
  trainee = JSON.parse(stored);

  const { data: fresh } = await db.from('trainees').select('*').eq('id', trainee.id).single();
  if (fresh) { trainee = fresh; sessionStorage.setItem('trainee', JSON.stringify(fresh)); }

  const initial = trainee.name.charAt(0).toUpperCase();
  document.getElementById('trainee-avatar').textContent = initial;
  document.getElementById('trainee-name-sm').textContent = trainee.name;
  document.getElementById('trainee-email-sm').textContent = trainee.email;
  document.getElementById('pm-avatar').textContent = initial;
  document.getElementById('pm-name').textContent = trainee.name;
  if (document.documentElement.getAttribute('data-theme') === 'dark') document.getElementById('pm-theme').classList.add('on');

  const { data: cats } = await db.from('categories').select('*').order('order_index');
  categories = cats || [];
  renderCategoryNav();

  const { data: m } = await db.from('macros').select('*').order('sort_index');
  macros = m || [];

  if (trainee.all_categories || trainee.current_category_id) {
    let query = db
      .from('tickets')
      .select('id,category_id,customer_name,customer_email,order_number,subject,message,order_value,order_status,loyalty_tier,order_items,ideal_response');
    if (!trainee.all_categories) query = query.eq('category_id', trainee.current_category_id);
    const { data: tix } = await query;
    tickets = tix || [];

    const { data: subs } = await db.from('submissions').select('*').eq('trainee_id', trainee.id);
    submissions = subs || [];

    if (trainee.all_categories) {
      document.getElementById('ttv-title-text').textContent = 'All Categories';
    } else {
      const cat = categories.find(c => c.id === trainee.current_category_id);
      document.getElementById('ttv-title-text').textContent = cat ? cat.name : 'My Tickets';
    }
    document.getElementById('ttv-icon').textContent = '📂';
  }

  document.getElementById('nav-ticket-count').textContent = tickets.length;
  document.getElementById('ttv-count').textContent = `Showing ${tickets.length} item${tickets.length !== 1 ? 's' : ''}`;
  renderTicketTable();
  document.getElementById('loading').style.display = 'none';
}

function renderCategoryNav() {
  const nav = document.getElementById('category-nav');
  nav.innerHTML = categories.map(cat => {
    const isCurrent = cat.id === trainee.current_category_id;
    return `<div class="nav-item${isCurrent ? ' active' : ' nav-locked'}" title="${cat.name}">
      <div class="nav-item-left">
        <span class="nav-item-icon">${isCurrent ? '📂' : '📁'}</span>
        <span class="nav-item-label">${cat.name}</span>
      </div>
      ${isCurrent ? '<span class="nav-active-badge">active</span>' : ''}
    </div>`;
  }).join('');
}

function initials(name) { return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase(); }
function getSub(ticketId) { return submissions.find(s => s.ticket_id === ticketId); }

function relativeTime() { return 'Today'; }

function scoreDotClass(s) { return s >= 3 ? 'dot-score-3' : s == 2 ? 'dot-score-2' : 'dot-score-1'; }
function scoreBadgeClass(s) { return s >= 3 ? 'badge-score-3' : s == 2 ? 'badge-score-2' : 'badge-score-1'; }
// Normalise any raw order status to one of the three real Shopify fulfilment states.
function fulfilment(raw) {
  if (!raw) return null;
  const s = String(raw).toLowerCase();
  if (s.includes('partial')) return { label: 'Partially fulfilled', cls: 'os-partial' };
  if (s.includes('deliver') || s.includes('shipped') || s === 'fulfilled') return { label: 'Fulfilled', cls: 'os-fulfilled' };
  return { label: 'Unfulfilled', cls: 'os-unfulfilled' };
}

function renderTicketTable() {
  const tbody = document.getElementById('ticket-tbody');
  if (!tickets.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:48px;color:#9ca3af">No tickets in this category yet.</td></tr>';
    return;
  }
  const isMarked = t => { const s = getSub(t.id); return s && s.score != null; };
  const marked = tickets.filter(isMarked);
  const toAction = tickets.filter(t => !isMarked(t));

  const row = t => {
    const sub = getSub(t.id);
    const isActive = t.id === activeTicketId;
    let dotClass = 'dot-open', statusLabel = 'Open';
    if (sub && sub.score != null) { dotClass = scoreDotClass(sub.score); statusLabel = `${sub.score}/3`; }
    return `<tr class="${isActive ? 'active-row' : ''}" onclick="openTicket(${t.id})">
      <td><input type="checkbox" class="tt-checkbox" onclick="event.stopPropagation()" /></td>
      <td>
        <div class="tt-subject">${t.subject}</div>
        <div class="tt-preview">${t.message.replace(/\n/g,' ').substring(0,70)}…</div>
      </td>
      <td class="tt-assignee">${trainee.name}</td>
      <td class="tt-time">Today</td>
      <td class="tt-time bold">Today</td>
      <td><span class="tt-status-dot ${dotClass}"></span>${statusLabel}</td>
    </tr>`;
  };
  const groupHeader = (label, n) => `<tr class="tt-group"><td colspan="6"><span class="tt-group-label">${label}</span><span class="tt-group-count">${n}</span></td></tr>`;

  let html = groupHeader('Tickets to action', toAction.length);
  html += toAction.length ? toAction.map(row).join('') : '<tr><td colspan="6" class="tt-empty">Nothing to action right now — nice work!</td></tr>';
  html += groupHeader('Marked Tickets', marked.length);
  html += marked.length ? marked.map(row).join('') : '<tr><td colspan="6" class="tt-empty">No marked tickets yet — submit a reply to get scored.</td></tr>';
  tbody.innerHTML = html;
}

function showTableView() {
  activeTicketId = null;
  document.getElementById('ticket-table-view').style.display = 'flex';
  document.getElementById('ticket-detail').style.display = 'none';
  renderTicketTable();
}

function openTicket(id) {
  activeTicketId = id;
  usedMacro = null;
  renderTicketTable();
  const ticket = tickets.find(t => t.id === id);
  const sub = getSub(id);

  document.getElementById('ticket-table-view').style.display = 'none';
  const detail = document.getElementById('ticket-detail');
  detail.style.display = 'flex';
  detail.style.flexDirection = 'column';

  document.getElementById('td-subject').textContent = ticket.subject;

  const badge = document.getElementById('td-status-badge');
  if (sub && sub.score != null) { badge.textContent = `${sub.score}/3`; badge.className = `td-status-badge ${scoreBadgeClass(sub.score)}`; }
  else if (sub) { badge.textContent = 'Submitted'; badge.className = 'td-status-badge badge-submitted'; }
  else { badge.textContent = 'Open'; badge.className = 'td-status-badge badge-open'; }

  renderMessages(ticket, sub);
  renderReplySection(ticket, sub);
  renderCustomerSidebar(ticket);
}

function renderMessages(ticket, sub) {
  const area = document.getElementById('messages-area');
  const customerMsg = `
    <div class="msg-wrap">
      <div class="msg-ava customer">${initials(ticket.customer_name)}</div>
      <div class="msg-content">
        <div class="msg-meta"><span class="msg-sender">${ticket.customer_name}</span><span>${ticket.customer_email}</span></div>
        <div class="msg-card">${ticket.message.replace(/\n/g,'<br>')}</div>
      </div>
    </div>`;
  const agentReply = sub ? `
    <div class="msg-wrap">
      <div class="msg-ava agent">${trainee.name.charAt(0).toUpperCase()}</div>
      <div class="msg-content">
        <div class="msg-meta"><span class="msg-sender">${trainee.name} (you)</span><span>${new Date(sub.submitted_at).toLocaleString('en-GB',{dateStyle:'short',timeStyle:'short'})}</span></div>
        <div class="msg-card agent-card">${sub.reply_text.replace(/\n/g,'<br>')}</div>
      </div>
    </div>` : '';
  area.innerHTML = customerMsg + agentReply;
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

function renderReplySection(ticket, sub) {
  const section = document.getElementById('reply-section');
  if (sub) {
    if (sub.scoring) {
      section.innerHTML = `
        <div class="submitted-banner">
          <div>
            <div class="submitted-title">Scoring your reply…</div>
            <div class="submitted-sub">Marking against the ideal handling — this takes a few seconds.</div>
          </div>
        </div>`;
      return;
    }
    const scored = sub.score != null && sub.score !== undefined;
    const rf = sub.response_feedback || '';
    const af = sub.actions_feedback || '';
    const fbHtml = scored
      ? `<div class="feedback-box">
           <div style="margin-bottom:12px"><strong>Response</strong><br>${(rf || '—').replace(/\n/g,'<br>')}</div>
           <div><strong>Actions</strong><br>${(af || '—').replace(/\n/g,'<br>')}</div>
         </div>`
      : (sub.feedback ? `<div class="feedback-box"><strong>Trainer feedback:</strong><br>${sub.feedback.replace(/\n/g,'<br>')}</div>` : '');
    section.innerHTML = `
      ${fbHtml}
      <div class="submitted-banner">
        <div>
          <div class="submitted-title">Reply submitted</div>
          <div class="submitted-sub">${scored ? 'Scored automatically against the ideal handling.' : (sub.scoreError ? 'Saved, but auto-scoring couldn\'t run just now.' : 'Awaiting review.')}</div>
        </div>
        ${scored ? `<div class="score-display"><div class="score-val">${sub.score}/3</div><div class="score-label">Score</div></div>` : ''}
      </div>`;
  } else {
    section.innerHTML = `
      <div class="reply-box">
        <div class="reply-to-row">
          <button class="reply-channel-btn">✉️ Email ▾</button>
          <span class="reply-to-label">To:</span>
          <span class="reply-to-val">${ticket.customer_email}</span>
        </div>
        <div class="macro-bar">
          <button class="macro-trigger" onclick="toggleMacroPicker(event)">⚡ Macros</button>
          <div class="macro-picker" id="macro-picker">
            <input class="macro-search" id="macro-search" placeholder="Search macros…" oninput="filterMacros()" autocomplete="off" />
            <div class="macro-list" id="macro-list"></div>
          </div>
        </div>
        <textarea class="reply-textarea" id="reply-input" placeholder="Click here to reply…"></textarea>
        <div class="actions-note-wrap">
          <div class="actions-note-label">Actions — the steps you'd take on Shopify / Swap / Recharge etc.</div>
          <textarea class="actions-textarea" id="actions-input" placeholder="e.g. Check the order in Shopify — unfulfilled, so cancel the OOS item (Edit → untick Restock). MO the alternative with reason 'productswap'. Log refund reason from CW Essentials…"></textarea>
        </div>
        <div class="reply-toolbar">
          <span class="reply-hint">Your reply and actions will be scored automatically.</span>
          <div class="reply-actions">
            <button class="send-close-btn" onclick="submitReply(${ticket.id}, true)">Send &amp; Close</button>
            <button class="submit-btn" id="submit-btn" onclick="submitReply(${ticket.id}, false)">Send</button>
          </div>
        </div>
      </div>`;
  }
}

function mEsc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleMacroPicker(e) {
  if (e) e.stopPropagation();
  const p = document.getElementById('macro-picker');
  if (!p) return;
  const open = p.classList.toggle('open');
  if (open) {
    renderMacroList('');
    const s = document.getElementById('macro-search');
    if (s) { s.value = ''; s.focus(); }
  }
}

function renderMacroList(q) {
  const list = document.getElementById('macro-list');
  if (!list) return;
  if (!macros.length) {
    list.innerHTML = '<div class="macro-empty">No macros loaded yet. Run macros.sql in Supabase to add them.</div>';
    return;
  }
  const ql = (q || '').toLowerCase();
  const matches = macros.filter(m => m.name.toLowerCase().includes(ql) || (m.category || '').toLowerCase().includes(ql));
  if (!matches.length) { list.innerHTML = '<div class="macro-empty">No macros match that search.</div>'; return; }
  list.innerHTML = matches.map(m => `
    <div class="macro-item" onclick="insertMacro(${m.id})">
      <div class="macro-item-cat">${mEsc(m.category)}</div>
      <div class="macro-item-name">${mEsc(m.name)}</div>
      <div class="macro-item-preview">${mEsc(m.body.replace(/\n/g,' ').slice(0,100))}</div>
    </div>`).join('');
}

function filterMacros() {
  const s = document.getElementById('macro-search');
  renderMacroList(s ? s.value : '');
}

function insertMacro(id) {
  const m = macros.find(x => x.id === id);
  if (!m) return;
  const t = tickets.find(x => x.id === activeTicketId);
  const first = (t && t.customer_name) ? t.customer_name.split(' ')[0] : 'there';
  const body = m.body.replace(/\{\{\s*ticket\.customer\.firstname\s*\}\}/g, first);
  usedMacro = { name: m.name, body: body };
  const input = document.getElementById('reply-input');
  if (input) { input.value = body; input.style.border = 'none'; input.focus(); }
  const p = document.getElementById('macro-picker');
  if (p) p.classList.remove('open');
}

document.addEventListener('click', e => {
  const p = document.getElementById('macro-picker');
  if (p && p.classList.contains('open') && !e.target.closest('.macro-bar')) p.classList.remove('open');
});

function renderCustomerSidebar(ticket) {
  const fs = fulfilment(ticket.order_status);
  const loyaltyClass = { 'Bronze':'loyalty-bronze','Silver':'loyalty-silver','Gold':'loyalty-gold','VIP':'loyalty-vip' }[ticket.loyalty_tier] || '';

  document.getElementById('customer-sidebar').innerHTML = `
    <div class="cs-section">
      <div class="cs-title">Ticket details</div>
      <button class="cs-addtag">+ Add tags</button>
      <div class="cs-row"><span class="cs-label">Contact reason</span><span style="font-size:11px;color:#7c3aed;cursor:pointer">+ Add</span></div>
    </div>
    <div class="cs-section">
      <div class="cs-title">👤 ${ticket.customer_name}</div>
      <div class="cs-row"><span class="cs-label">Email</span><span class="cs-value" style="color:#7c3aed;font-size:11px">${ticket.customer_email}</span></div>
      ${ticket.loyalty_tier ? `<div class="cs-row"><span class="cs-label">Loyalty</span><span class="cs-value"><span class="loyalty-badge ${loyaltyClass}">${ticket.loyalty_tier}</span></span></div>` : ''}
      <div style="font-size:11px;color:#7c3aed;cursor:pointer;margin-top:6px">▾ Show more</div>
    </div>
    ${ticket.order_number ? `
    <div class="cs-section">
      <div class="cs-title">Recent Orders</div>
      <div class="order-card">
        <div class="order-num">${ticket.order_number}</div>
        ${ticket.order_value ? `<div style="font-size:12px;color:#374151;margin-top:3px">${ticket.order_value}</div>` : ''}
        ${fs ? `<span class="order-status-badge ${fs.cls}">${fs.label}</span>` : ''}
        ${ticketProducts(ticket) ? `<div class="cs-items">${renderProducts(ticketProducts(ticket))}</div>` : ''}
      </div>
    </div>` : ''}
    <div class="cs-section">
      <div class="cs-title">Agent Notes</div>
      <textarea class="cs-notes" placeholder="Private notes (not saved)…"></textarea>
    </div>`;
}

async function submitReply(ticketId, andClose) {
  const input = document.getElementById('reply-input');
  const reply = input ? input.value.trim() : '';
  if (!reply) { if (input) { input.style.border = '1px solid #ef4444'; input.placeholder = 'Please write a reply first.'; } return; }
  const actionsInput = document.getElementById('actions-input');
  const actions = actionsInput ? actionsInput.value.trim() : '';

  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  const { data, error } = await db.from('submissions').insert({
    trainee_id: trainee.id, ticket_id: ticketId, reply_text: reply, actions_text: actions
  }).select().single();

  if (error) { if (btn) { btn.disabled = false; btn.textContent = 'Send'; } alert('Error: ' + error.message); return; }

  submissions.push(data);
  const ticket = tickets.find(t => t.id === ticketId);
  renderMessages(ticket, data);

  // Show scoring-in-progress
  data.scoring = true;
  renderReplySection(ticket, data);
  const badge = document.getElementById('td-status-badge');
  badge.textContent = 'Scoring…';
  badge.className = 'td-status-badge badge-submitted';

  // Auto-score via the n8n webhook
  try {
    const res = await fetch(SCORING_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        submission_id: data.id, ticket_id: ticketId,
        reply_text: reply, actions_text: actions,
        macro_name: usedMacro ? usedMacro.name : null,
        macro_body: usedMacro ? usedMacro.body : null,
        customer_name: ticket.customer_name, message: ticket.message,
        ideal_response: ticket.ideal_response, order_items: ticketProducts(ticket),
        order_value: ticket.order_value, order_status: ticket.order_status
      })
    });
    if (!res.ok) throw new Error('scoring ' + res.status);
    const result = await res.json();
    data.score = result.score;
    data.response_feedback = result.response_feedback;
    data.actions_feedback = result.actions_feedback;
    data.feedback = 'Response: ' + (result.response_feedback || '') + '\n\nActions: ' + (result.actions_feedback || '');
  } catch (e) {
    data.scoreError = true;
  }
  data.scoring = false;

  renderTicketTable();
  renderMessages(ticket, data);
  renderReplySection(ticket, data);
  const badge2 = document.getElementById('td-status-badge');
  if (data.score != null) { badge2.textContent = `${data.score}/3`; badge2.className = `td-status-badge ${scoreBadgeClass(data.score)}`; }
  else { badge2.textContent = 'Submitted'; badge2.className = 'td-status-badge badge-submitted'; }
}

function toggleNavSection(id, el) {
  const section = document.getElementById(id);
  const caret = document.getElementById(id + '-caret');
  if (!section) return;
  const open = section.style.display !== 'none';
  section.style.display = open ? 'none' : 'block';
  if (caret) caret.textContent = open ? '▾' : '▴';
}

function toggleProfileMenu(e) { if (e) e.stopPropagation(); const m = document.getElementById('profile-menu'); if (m) m.classList.toggle('open'); }
function toggleAvailability(e) { if (e) e.stopPropagation(); const t = document.getElementById('pm-avail'); if (t) t.classList.toggle('on'); }
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('healf_theme', t);
  const sw = document.getElementById('pm-theme'); if (sw) sw.classList.toggle('on', t === 'dark');
}
function toggleTheme(e) { if (e) e.stopPropagation(); applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
document.addEventListener('click', e => {
  const m = document.getElementById('profile-menu');
  if (m && m.classList.contains('open') && !e.target.closest('#profile-menu') && !e.target.closest('#profile-trigger') && !e.target.closest('.footer-icons')) m.classList.remove('open');
});

function signOut() { sessionStorage.removeItem('trainee'); window.location.href = 'index.html'; }

init();
</script>
